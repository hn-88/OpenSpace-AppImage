name: windows-crash-dump

on: 
  workflow_dispatch:

jobs:
  test-crash:
    runs-on: windows-latest

    steps:
    - name: Download Pre-built OpenSpace Zip
      shell: pwsh
      run: |
        # Disable progress bar for faster downloading in PowerShell
        $ProgressPreference = 'SilentlyContinue'
        $DownloadUrl = "https://github.com/hn-88/OpenSpace-AppImage/releases/download/daily-WIN-ZIP/OpenSpace-minimal-daily.zip"
        
        echo "Downloading OpenSpace from $DownloadUrl ..."
        Invoke-WebRequest -Uri $DownloadUrl -OutFile "OpenSpace.zip"

    - name: Extract OpenSpace
      shell: pwsh
      run: |
        echo "Extracting OpenSpace.zip..."
        Expand-Archive -Path "OpenSpace.zip" -DestinationPath "OpenSpace" -Force

    - name: Run OpenSpace with empty profile
      shell: pwsh
      run: |
        cd OpenSpace
        echo "Configuring Windows Error Reporting to collect crash dumps silently..."
        $CrashDumpDir = "$env:LOCALAPPDATA\CrashDumps"
        New-Item -ItemType Directory -Force -Path $CrashDumpDir | Out-Null
        echo "CRASH_DUMPS_DIR=$CrashDumpDir" >> $env:GITHUB_ENV
        
        # Configure Windows Error Reporting to save full crash dumps and disable the crash dialog (so it won't hang the runner)
        Set-ItemProperty -Path "HKCU:\Software\Microsoft\Windows\Windows Error Reporting" -Name "DontShowUI" -Value 1 -Type DWord -Force
        New-Item -Path "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps\OpenSpace.exe" -Force -ErrorAction SilentlyContinue | Out-Null
        Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps\OpenSpace.exe" -Name "DumpFolder" -Value $CrashDumpDir -Type ExpandString -Force
        Set-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps\OpenSpace.exe" -Name "DumpType" -Value 2 -Type DWord -Force
        
        echo "Running OpenSpace with the empty profile..."
        
        # Output paths for console logs
        $outFile = "crash_output.log"
        $errFile = "crash_error.log"
        
        # Execute OpenSpace (it will run from inside the extracted OpenSpace folder)
        $process = Start-Process -FilePath ".\bin\OpenSpace.exe" -ArgumentList "-p", "empty" -RedirectStandardOutput $outFile -RedirectStandardError $errFile -PassThru
        
        try {
          # Give it up to 600 seconds to initialize or crash
          Wait-Process -Id $process.Id -Timeout 600 -ErrorAction Stop
          echo "OpenSpace exited with code $($process.ExitCode)"
        } catch {
          echo "OpenSpace timed out after 600 seconds. Terminating process..."
          Stop-Process -Id $process.Id -Force
        }
        
        # Print logs directly to the GitHub Actions terminal for immediate feedback
        if (Test-Path $outFile) {
          echo "=== OpenSpace Console Output ==="
          Get-Content $outFile
        }
        if (Test-Path $errFile) {
          echo "=== OpenSpace Error Output ==="
          Get-Content $errFile
        }
      continue-on-error: true

    - name: Upload OpenSpace crash logs and call stack
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: OpenSpace-Crash-Logs
        path: |
          OpenSpace/logs/
          OpenSpace/**/*.dmp
          OpenSpace/**/*.mdmp
          OpenSpace/crash_*.log
          ${{ env.CRASH_DUMPS_DIR }}/**
