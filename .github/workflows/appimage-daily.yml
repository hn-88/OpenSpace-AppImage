name: appimage-daily

on: 
  workflow_dispatch:      # allows manual trigger
  schedule:
    - cron: "7 2 * * *"   # runs daily at 02:07 UTC

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  # This yml is copied from https://github.com/hn-88/OCVWarp/blob/master/.github/workflows/cmake-nix.yml
  # and modified.
  BUILD_TYPE: Release
  OPENSPACE_VERSION: "0.22.0rc1+"
  APPIMAGE_VERSION: "2"
  # COMMIT_HASH: "0bec798cb39c2765373283a21312478d3d2e3c7f"
  COMMIT_HASH: "master"

  
jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v6
        
    - name: Install Qt 6.9
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.9.*

    - name: Export Qt environment variables
      shell: bash
      run: |
        echo "Qt installation is at: $QT_ROOT_DIR"
    
        # For CMake find_package(Qt6 ...)
        echo "CMAKE_PREFIX_PATH=$QT_ROOT_DIR" >> $GITHUB_ENV
    
        # Common variables used by packaging scripts
        echo "Qt6_DIR=$QT_ROOT_DIR/lib/cmake/Qt6" >> $GITHUB_ENV
        echo "QT_DIR=$QT_ROOT_DIR" >> $GITHUB_ENV
    
        # Optional: add Qt tools to PATH
        echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH

        # Verify libicu* are under QT_ROOT_DIR
        find $QT_ROOT_DIR -name "libicu*"

    - name: Install CMake 4.3.2
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: '4.3.2'
    
    - name: get openspace code for a particular release
      # https://docs.openspaceproject.com/releases-v0.20/contribute/development/compiling/ubuntu.html
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        git clone --recursive https://github.com/OpenSpace/OpenSpace "$openSpaceHome"
        cd "$openSpaceHome"
        git checkout "${COMMIT_HASH}" --recurse-submodules
        # try the latest main branch, one of the newest commits
        mkdir build
        cd build
        
    - name: Install dependencies
      # https://docs.openspaceproject.com/releases-v0.20/contribute/development/compiling/ubuntu.html
      run: |
        sudo apt-get update
        sudo apt-get install -y glew-utils libpng-dev freeglut3-dev git libxrandr-dev libxinerama-dev xorg-dev libxcursor-dev libcurl4-openssl-dev libxi-dev libasound2-dev libgdal-dev libboost1.74-dev qt6-base-dev libmpv-dev libvulkan-dev
        sudo apt-get install -y software-properties-common
        sudo apt-get install -y libasound2 libasound2-data libasound2-plugins libjack0

    
    - name: Set up Homebrew
      uses: Homebrew/actions/setup-homebrew@master

    - name: Install GCC 13 (via Homebrew)
      run: |
        # Bypasses Launchpad entirely by downloading from GitHub's own registry
        brew install gcc@13

    - name: Install patch for molecule shaders
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cp -vf deb-patches/patch*.patch "$openSpaceHome"
        cd $openSpaceHome
        git apply --verbose --recount --whitespace=fix patch_1_md_os_h.patch
        git apply --verbose --recount --whitespace=fix patch_2_md_os_c.patch
        git apply --verbose --recount --whitespace=fix patch_3_md_gl_c.patch
        
  
    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd "$openSpaceHome/build"
        cmake "$openSpaceHome" \
          -DCMAKE_BUILD_TYPE="Release" \
          -DCMAKE_CXX_COMPILER="/home/linuxbrew/.linuxbrew/bin/g++-13" \
          -DCMAKE_C_COMPILER="/home/linuxbrew/.linuxbrew/bin/gcc-13" \
          -DCMAKE_CXX_STANDARD=23 \
          -DASSIMP_BUILD_MINIZIP=1 \
          -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++" \
          -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
          -DBUILD_TESTS=OFF \
          -DOPENSPACE_HAVE_TESTS=OFF \
          -DSGCT_BUILD_TESTS=OFF

    - name: Build
      # Build your program with the given configuration
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd "$openSpaceHome/build"
        # Use the system's libvulkan, not the vendored one, otherwise they might conflict
        cef_orig_dir=$(find $HOME/source/OpenSpace/build -path */Release/libcef.so | xargs dirname)
        rm -vf "$cef_orig_dir/libvulkan.so.1" || echo "libvulkan.so.1 not found, skipping removal"
        make -j $(nproc)

    - name: custom run script
      working-directory: ${{github.workspace}}
      run: |
        chmod +x appdir/run.sh
        
        
    - name: Create appimage directory
      working-directory: ${{github.workspace}}
      run: |
        echo "create appimage"
        # Create standard AppImage folders
        mkdir -p appdir/usr/bin appdir/usr/lib        
        
        cp $HOME/source/OpenSpace/bin/OpenSpace_Helper $HOME/source/OpenSpace/bin/OpenSpace ./appdir/usr/bin
        strip ./appdir/usr/bin/*        

        # appimagetool gets confused if the Exec line is a shell script
        sed -i 's|^Exec=run\.sh OpenSpace$|Exec=OpenSpace|' ./appdir/OpenSpace.desktop
        mkdir -p appdir/usr/share/applications ; cp ./appdir/OpenSpace.desktop ./appdir/usr/share/applications/
        mkdir -p appdir/usr/share/icons/hicolor/256x256/apps ; cp ./appdir/OpenSpace.png ./appdir/usr/share/icons/hicolor/256x256/apps/

        # The OpenSpace executable expects these files in the parent directory of its bin directory
        cp -r $HOME/source/OpenSpace/{config/,modules/,data/,scripts/,shaders,/documentation/,openspace.cfg} ./appdir/usr/

        # patch file created with diff -u openspace.cfg openspace.edited
        patch ./appdir/usr/openspace.cfg < ./appdir/openspacef12f5e2.cfg.patch

        # delete source files from modules directory
        find ./appdir/usr/ -name '*.cpp' -print0 | xargs -0 -P2 rm
        find ./appdir/usr/ -name 'CMakeLists.txt'  -print0 | xargs -0 -P2 rm
        find ./appdir/usr/ -name '*.h' -print0 | xargs -0 -P2 rm
        find ./appdir/usr/ -name '*.cmake' -print0 | xargs -0 -P2 rm
        
        # Download appimagetool
        wget -c https://github.com/$(wget -q https://github.com/probonopd/go-appimage/releases/expanded_assets/continuous -O - | grep "appimagetool-.*-x86_64.AppImage" | head -n 1 | cut -d '"' -f 2)
        chmod +x appimagetool-*.AppImage

        # Add our appdir/usr/lib to LD_LIBRARY_PATH so go-appimage deploy 
        # sees that libcef.so is ALREADY resolved and doesn't try to mirror the path
        export LD_LIBRARY_PATH="$(pwd)/appdir/usr/lib:$LD_LIBRARY_PATH"

        # Explicitly bundle libmpv and its transitive deps — appimagetool deploy
        # often misses version-suffixed sonames like libmpv.so.1 or libmpv.so.2.
        echo "Bundling libmpv explicitly..."
        for lib in $(ldconfig -p | grep -E 'libmpv' | awk '{print $NF}'); do
          echo "  Copying $lib"
          cp -v "$lib" ./appdir/usr/lib/ || true
        done
        # Create the expected versioned symlinks alongside the real file so
        # that dlopen("libmpv.so.1") and dlopen("libmpv.so") both resolve.
        (cd ./appdir/usr/lib && \
          for f in libmpv.so.*.*; do
            [ -f "$f" ] || continue
            major=$(echo "$f" | grep -oP '(?<=libmpv\.so\.)\d+')
            ln -sf "$f" "libmpv.so.${major}" 2>/dev/null || true
            ln -sf "$f" "libmpv.so"          2>/dev/null || true
          done)

        # Bundle system libraries
        ./appimagetool-*.AppImage deploy appdir/usr/share/applications/OpenSpace.desktop

        # Manually bundle libjack
        echo "Searching for libjack.so* on runner..."

        JACK_LIBS=$(find /usr/lib /lib /usr/local/lib \
          \( -name "libjack.so*" -o -name "libjackserver.so*" \) \
          2>/dev/null | sort -u)
    
        if [ -n "$JACK_LIBS" ]; then
          echo "Found JACK libraries:"
          echo "$JACK_LIBS"
    
          while IFS= read -r lib; do
            echo "Copying $lib"
            cp -av "$lib" appdir/usr/lib/
          done <<< "$JACK_LIBS"
    
        else
          echo "::warning::libjack.so* not found on GitHub runner. Continuing build without JACK libraries."
        fi
        
        # Manually place CEF files exactly where they belong ---
        echo "Copying CEF libraries to appdir/usr/lib..."      
        
        # Copy libcef.so AND all its required .pak/.dat files
        cef_release_dir=$(find $HOME/source/OpenSpace/build -name "libcef.so" | grep -i release | xargs dirname | head -n 1)
        cef_data_dir=$(find $HOME/source/OpenSpace/build -name "resources.pak" | xargs dirname | head -n 1)

        echo "cef_release_dir is $cef_release_dir"
        echo "cef_data_dir is $cef_data_dir"
        
        # Data files (pak, locales, icudtl.dat, etc.)
        cp -rv "$cef_data_dir"/*.pak ./appdir/usr/bin/
        cp -rv "$cef_data_dir"/*.dat ./appdir/usr/bin/
        cp -rv "$cef_data_dir"/locales ./appdir/usr/bin/
        
        # CEF shared libraries
        cp -v "$cef_release_dir"/libcef.so    ./appdir/usr/bin/
        cp -v "$cef_release_dir"/libEGL.so    ./appdir/usr/bin/  2>/dev/null || true
        cp -v "$cef_release_dir"/libGLESv2.so ./appdir/usr/bin/  2>/dev/null || true
        
        # V8 snapshot — must live next to the executable
        cp -v "$cef_release_dir"/v8_context_snapshot.bin ./appdir/usr/bin/
        cp -v "$cef_release_dir"/snapshot_blob.bin       ./appdir/usr/bin/ 2>/dev/null || true

        cp -v "$cef_release_dir"/libvk_swiftshader.so  ./appdir/usr/bin/
        cp -v "$cef_release_dir"/vk_swiftshader_icd.json ./appdir/usr/bin/ 2>/dev/null || true
        
        # Strip libcef (libcef.so goes from 1.3GB to less than 200MB)
        strip --strip-unneeded ./appdir/usr/bin/libcef.so || true

        # remove unnecessarily bundled /home libraries from cef and homebrew
        # or move to the right place instead of deleting
        mv ./appdir/home/linuxbrew/.linuxbrew/lib/liblz4.so.1   ./appdir/usr/lib/
        mv ./appdir/home/linuxbrew/.linuxbrew/lib/liblzma.so.5  ./appdir/usr/lib/
        mv ./appdir/home/linuxbrew/.linuxbrew/lib/libzstd.so.1  ./appdir/usr/lib/
        rm -vfr ./appdir/home

        # We install gcc-13 in the build env and it also pulls a libstdc++ that's newer than the
        # one in Ubuntu 22.04.5 and OpenSpace links to it. As a result, in order to make the
        # AppImage more portable (at least vanilla Ubuntu 22.04.5), we need to bundle that lib as
        # well, or perhaps do static linking.
        # Trying static linking instead was not sufficient.
        libstdcxx=$(find /home/linuxbrew/.linuxbrew -name "libstdc++.so.6")
        # libstdcxx=/lib/x86_64-linux-gnu/libstdc++.so.6
        cp -vf ${libstdcxx} ./appdir/lib/x86_64-linux-gnu/libstdc++.so.6

    - name: Fix AppImage (interpreter + rpath + audit)
      run: |
        set -e
    
        echo "=== Collecting ELF binaries ==="
        # We find all executables AND shared libraries (even if missing execution permissions)
        ELF_FILES=$(find appdir/usr/bin appdir/usr/lib -type f \( -name "*.so*" -o -name "OpenSpac*" \) -exec sh -c 'file "$1" | grep -q ELF && echo "$1"' _ {} \;)
        # some .so files may not have executable flag set after copying
        # avoid picking up run.sh
    
        echo ""
        echo "=== Fixing ELF interpreter ==="
        for f in $ELF_FILES; do
          # Only executables have interpreters; patching .so files throws a harmless error, 
          # but we can filter it cleanly by checking if it's an executable vs shared object.
          if file "$f" | grep -q "executable"; then
            echo "Patching interpreter: $f"
            patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 "$f" || true
          fi
        done
        
        echo "=== GLIBC compatibility check ==="
        MAX_GLIBC=$(strings appdir/usr/bin/OpenSpace | grep GLIBC_ | sort -V | tail -1)
        echo "Max GLIBC required: $MAX_GLIBC"
    
        REQUIRED="GLIBC_2.35"
    
        if [ "$(printf '%s\n' "$REQUIRED" "$MAX_GLIBC" | sort -V | head -1)" != "$MAX_GLIBC" ]; then
          echo "ERROR: Binary requires newer glibc than Ubuntu 22.04!"
          exit 1
        fi
    
        echo "GLIBC requirement OK"

    - name: delete unnecessary files from appdir
      run: |
        # Generated by Claude on passing it the file tree with
        # cd squashfs-root; tree > ~/appimagecontentstree.txt
        # Patch files and stray source files in the AppDir root
        rm -vf ./appdir/cfgpatch-ui-rewrite-2025.patch
        rm -vf ./appdir/openspace2048a1b-cfg.patch
        rm -vf ./appdir/openspace2cffefb.cfg.patch
        rm -vf ./appdir/openspace6b0de70.cfg.patch
        rm -vf ./appdir/openspacecfg.patch
        rm -vf ./appdir/openspacef12f5e2.cfg.patch
        rm -vf ./appdir/sgct-include-sgct-screencapture.h
        rm -vf ./appdir/sgct-src-image.cpp
        rm -vf ./appdir/sgct-src-screencapture.cpp
        rm -vf ./appdir/readme.txt
        
        # Windows-only files
        rm -vf ./appdir/usr/data/modules/spout/ext/spout/SpoutLibrary.dll
        rm -vf ./appdir/usr/data/modules/spout/ext/spout/SpoutLibrary.lib
        rm -vf ./appdir/usr/data/modules/spout/ext/readme.md
        
        rm -vf ./appdir/usr/data/modules/webbrowser/cef_webgui.rc
        rm -vf ./appdir/usr/data/modules/webbrowser/codegentest.exe.manifest
        rm -vf ./appdir/usr/data/modules/webbrowser/compatibility.manifest
        rm -vf ./appdir/usr/data/modules/webbrowser/DocsWriter.exe.manifest
        rm -vf ./appdir/usr/data/modules/webbrowser/OpenSpace.exe.manifest
        rm -vf ./appdir/usr/data/modules/webbrowser/OpenSpace_Helper.exe.manifest
        rm -vf ./appdir/usr/data/modules/webbrowser/OpenSpace-MinVR.exe.manifest
        rm -vf ./appdir/usr/data/modules/webbrowser/OpenSpaceTest.exe.manifest
        rm -vf ./appdir/usr/data/modules/webbrowser/Sync.exe.manifest
        rm -vf ./appdir/usr/data/modules/webbrowser/TaskRunner.exe.manifest
        rm -vf ./appdir/usr/data/modules/webbrowser/Tester.exe.manifest
        rm -vf ./appdir/usr/data/modules/webbrowser/Wormhole.exe.manifest
        # macOS Xcode projects and resources
        rm -rf ./appdir/usr/data/modules/touch/ext/libTUIO11/macosx/
        
        # Windows Visual Studio projects and Windows SDL/GL binaries
        rm -rf ./appdir/usr/data/modules/touch/ext/libTUIO11/windows/
        
        # Build system files
        rm -vf ./appdir/usr/data/modules/touch/ext/libTUIO11/Makefile
        
        # Full docs tree (HTML, PDFs, SVGs, .mmd files — ~hundreds of files)
        rm -rf ./appdir/usr/data/modules/base/ext/soloud/docs/
        
        # Code-generation and tooling scripts
        rm -rf ./appdir/usr/data/modules/base/ext/soloud/scripts/
        
        # Non-Linux backend stubs (pre-compiled DLL loaders, not needed at runtime)
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/src/backend/openal/soloud_openal_dll.c
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/src/backend/portaudio/soloud_portaudio_dll.c
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/src/backend/sdl/soloud_sdl1_dll.c
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/src/backend/sdl/soloud_sdl2_dll.c
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/src/backend/sdl/soloud_openmpt_dll.c 2>/dev/null || true
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/src/audiosource/openmpt/soloud_openmpt_dll.c
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/src/audiosource/wav/stb_vorbis.c
        
        # SoLoud root-level non-essential files
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/issue_template.md
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/PULL_REQUEST_TEMPLATE.md
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/README.md
        rm -vf ./appdir/usr/data/modules/base/ext/soloud/soloud.png
        
        # Full HTML docs tree (pre-generated Doxygen output)
        rm -rf ./appdir/usr/data/modules/fitsfilereader/ext/CCfits/html/
        
        # Autoconf / build system files (not needed at runtime)
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/CCfits/aclocal.m4
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/CCfits/configure
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/CCfits/configure.ac
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/CCfits/Makefile.am
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/CCfits/Makefile.in
        rm -rf ./appdir/usr/data/modules/fitsfilereader/ext/CCfits/config/
        rm -rf ./appdir/usr/data/modules/fitsfilereader/ext/CCfits/vs.net/
        
        # Windows Visual Studio build files
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/CCfits/vs.net/
        
        rm -rf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/docs/
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/cookbook.f
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/testf77.f
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/testf77.out
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/testf77.std
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/testprog.out
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/testprog.std
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/testprog.tpt
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/cfitsio_mac.sit.hqx
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/makefile.bc
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/makefile.vcc
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/makepc.bat
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/winDumpExts.mak
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/windumpexts.c
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/README.MacOS
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/README_OLD.win
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/README.win
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/vmsieee.c
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/configure
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/configure.in
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/Makefile.in
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/install-sh
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/config.guess
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/config.sub
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/f77.inc
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/f77_wrap1.c
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/f77_wrap2.c
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/f77_wrap3.c
        rm -vf ./appdir/usr/data/modules/fitsfilereader/ext/cfitsio/f77_wrap4.c
        
        rm -vf ./appdir/usr/openspace.cfg.orig

        # finally set the run.sh to be target of desktop
        mv -v appdir/run.sh appdir/usr/bin        
        chmod +x appdir/usr/bin/run.sh
        sed -i 's|^Exec=OpenSpace$|Exec=run\.sh OpenSpace|' ./appdir/usr/share/applications/OpenSpace.desktop
        
    - name: turn AppDir into AppImage
      run: |
        # turn AppDir into AppImage
        # DATE=$(date +%Y%m%dT%H%M%S)
        VERSION=${OPENSPACE_VERSION}-${APPIMAGE_VERSION}-daily ./appimagetool-*.AppImage ./appdir

    - name: Upload AppImage Artifact
      uses: actions/upload-artifact@v7
      with:
        # Artifact name
        name: OpenSpace-AppImage
        # optional, default is artifact
        # A file, directory or wildcard pattern that describes what to upload
        path: /home/runner/work/OpenSpace-AppImage/OpenSpace-AppImage/OpenSpace-*-x86_64.AppImage

    - name: Upload .AppImage to GitHub Release
      run: |
        RELEASE_TAG="daily-AppImage"
        APP_FILE=/home/runner/work/OpenSpace-AppImage/OpenSpace-AppImage/OpenSpace-*-x86_64.AppImage
    
        # Create release if it doesn't exist
        gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$RELEASE_TAG" -t "OpenSpace AppImage Daily Build" -n "Automated daily .AppImage build of OpenSpace."
    
        # (Optional) update title/notes each run
        gh release edit "$RELEASE_TAG" \
          -t "OpenSpace AppImage Daily Build" \
          -n "Automated daily build of OpenSpace (updated $(date '+%Y-%m-%d %H:%M:%S') UTC).  Please see usage notes and issues linked from https://github.com/hn-88/OpenSpace-AppImage/releases/tag/v0.21.2-1"
    
        # Upload .AppImage asset (overwrite if exists)
        gh release upload "$RELEASE_TAG" "$APP_FILE" --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}


      
    
