name: windows-11-arm

on: 
  workflow_dispatch:
  
  #schedule:
  #  - cron: "0 1 * * *"   # runs daily at 01:00 UTC

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  # This yml is copied from https://github.com/hn-88/OCVWarp/blob/master/.github/workflows/cmake-nix.yml
  # and modified.
  BUILD_TYPE: RelWithDebInfo
  OPENSPACE_VERSION: "0.22.0rc2plus"
  openSpaceHome: ${{ github.workspace }}/source/OpenSpace
  # The install qt action is supposed to set QT_DIR variable.
  buildConfig: RelWithDebInfo
  VCPKG_INSTALLATION_ROOT: C:/vcpkg
  
jobs:
  build:
    # https://docs.github.com/en/actions/reference/runners/github-hosted-runners#standard-github-hosted-runners-for-public-repositories
    runs-on: windows-11-arm

    steps:
    - uses: actions/checkout@v6

    - name: Free disk space
      shell: pwsh
      run: |
        Write-Host "=== Initial disk usage ==="
        Get-PSDrive
    
        # Remove NuGet cache
        Remove-Item "$env:USERPROFILE\.nuget\packages" -Recurse -Force -ErrorAction SilentlyContinue
    
        # Remove pip cache
        Remove-Item "$env:LOCALAPPDATA\pip\Cache" -Recurse -Force -ErrorAction SilentlyContinue
    
        # Remove temporary directories
        Get-ChildItem $env:TEMP | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
    
        # Remove MSVC build cache if any
        Remove-Item "$env:LOCALAPPDATA\Microsoft\MSBuild" -Recurse -Force -ErrorAction SilentlyContinue
    
        # Remove cargo cache (if Rust tools used)
        Remove-Item "$env:USERPROFILE\.cargo" -Recurse -Force -ErrorAction SilentlyContinue
    
        Write-Host "=== Final disk usage ==="
        Get-PSDrive
        

  
    - name: get openspace code for a particular release
      # https://docs.openspaceproject.com/releases-v0.20/contribute/development/compiling/ubuntu.html
      run: |
        git clone --recursive https://github.com/OpenSpace/OpenSpace $env:openSpaceHome
        cd $env:openSpaceHome
        git checkout "master" --recurse-submodules
        git submodule update --init --recursive
        mkdir build
        cd build

    - name: Search CMakeLists for zlib flags
      run: |
        Write-Host "=== option() calls mentioning zlib ==="
        Get-ChildItem -Path $env:openSpaceHome -Recurse -Include "CMakeLists.txt" |
          Select-String -Pattern "(?i)option.*zlib|zlib.*option" |
          ForEach-Object { Write-Host "$($_.Filename):$($_.LineNumber): $($_.Line.Trim())" }
    
        Write-Host "=== set() calls mentioning zlib ==="
        Get-ChildItem -Path $env:openSpaceHome -Recurse -Include "CMakeLists.txt" |
          Select-String -Pattern "(?i)set.*zlib|zlib.*set" |
          ForEach-Object { Write-Host "$($_.Filename):$($_.LineNumber): $($_.Line.Trim())" }
    
        Write-Host "=== zlibstatic references ==="
        Get-ChildItem -Path $env:openSpaceHome -Recurse -Include "CMakeLists.txt" |
          Select-String -Pattern "(?i)zlibstatic" |
          ForEach-Object { Write-Host "$($_.Filename):$($_.LineNumber): $($_.Line.Trim())" }

    - name: Remove bundled x64 lib files for ARM64 build
      run: |
        Write-Host "Searching for .lib files in $env:openSpaceHome ..."
        $libs = Get-ChildItem -Path "$env:openSpaceHome" -Recurse -Filter "*.lib" -ErrorAction SilentlyContinue
        Write-Host "Found $($libs.Count) .lib file(s):"
        $libs | ForEach-Object { Write-Host $_.FullName }
        $libs | Remove-Item -Force
        Write-Host "All bundled .lib files removed."

    - name: Install CMake 4.3.2
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: '4.3.2'

    - name: Install Qt 6.11
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.11.*

    - name: Download and restore vcpkg ARM64 cache
      shell: pwsh
      run: |
        $RELEASE_TAG  = "vcpkg-arm64-cache"
        $ZIP_FILE     = "vcpkg-arm64-windows.zip"
        $INSTALL_ROOT = $env:VCPKG_INSTALLATION_ROOT
    
        Write-Host "Downloading vcpkg cache from release $RELEASE_TAG ..."
        gh release download $RELEASE_TAG --pattern $ZIP_FILE --clobber
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Failed to download $ZIP_FILE from release $RELEASE_TAG"
          exit 1
        }
    
        Write-Host "Extracting to $INSTALL_ROOT\installed ..."
        New-Item -ItemType Directory -Force -Path "$INSTALL_ROOT\installed" | Out-Null
        7z x $ZIP_FILE -o"$INSTALL_ROOT\installed" -y
    
        Write-Host "Verifying key headers exist..."
        if (-not (Test-Path "$INSTALL_ROOT\installed\arm64-windows\include\gdal.h")) {
          Write-Error "gdal.h not found — cache extraction may have failed"
          exit 1
        }
        Write-Host "vcpkg cache restored successfully."
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}

    - name: Verify and set VCPKG_INSTALLATION_ROOT
      run: |
        if (-not $env:VCPKG_INSTALLATION_ROOT) {
          Write-Host "VCPKG_INSTALLATION_ROOT is not set, defaulting to C:/vcpkg"
          echo "VCPKG_INSTALLATION_ROOT=C:/vcpkg" >> $env:GITHUB_ENV
        } else {
          Write-Host "VCPKG_INSTALLATION_ROOT is already set to: $env:VCPKG_INSTALLATION_ROOT"
        }
        $toolchain = "$(if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { 'C:/vcpkg' })/scripts/buildsystems/vcpkg.cmake"
        Write-Host "Toolchain path: $toolchain"
        if (Test-Path $toolchain) {
          Write-Host "Toolchain file exists"
        } else {
          Write-Error "Toolchain file NOT found at $toolchain"
          exit 1
        }
    
    - name: Verify tiff.lib in cache
      run: Test-Path "C:/vcpkg/installed/arm64-windows/lib/tiff.lib"

    - name: Patch vcpkg libs and headers into expected OpenSpace paths
      run: |
        $vcpkgLib     = "C:/vcpkg/installed/arm64-windows/lib"
        $vcpkgInclude = "C:/vcpkg/installed/arm64-windows/include"
        $oshome         = $env:openSpaceHome
    
        function Patch-Lib($vcpkgName, $destDir, $destName) {
          $src = "$vcpkgLib/$vcpkgName"
          if (-not (Test-Path $src)) { Write-Error "Source not found: $src"; exit 1 }
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          Copy-Item $src "$destDir/$destName" -Force
          Write-Host "Patched lib: $src -> $destDir/$destName"
        }
    
        function Create-EmptyLib($destDir, $destName) {
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          $dest   = "$destDir/$destName"
          $libExe = Get-ChildItem "C:/Program Files/Microsoft Visual Studio/2022/Enterprise/VC/Tools/MSVC" `
                      -Recurse -Filter "lib.exe" |
                      Where-Object { $_.FullName -match "Hostarm64\\arm64" } |
                      Select-Object -First 1
          if (-not $libExe) { Write-Error "lib.exe not found"; exit 1 }
          & $libExe.FullName /OUT:"$dest" 2>&1 | Out-Null
          Write-Host "Created empty stub: $dest"
        }

        function Create-StubLib($destDir, $destName) {
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          $dest = "$destDir/$destName"
          # Copy a real small ARM64 lib as a stub - linker will find no needed symbols and move on
          Copy-Item "$vcpkgLib/libcurl.lib" $dest -Force
          Write-Host "Created stub: $dest"
        }
    
        # --- vcpkg lib replacements ---
        Patch-Lib "libcurl.lib" "$oshome/ext/curl/lib"                       "libcurl.lib"
        Patch-Lib "gdal.lib"    "$oshome/modules/globebrowsing/ext/gdal/lib" "gdal_i.lib"
    
        # --- Replace bundled gdal 2.x headers with vcpkg gdal 3.x headers ---
        $gdalInclude = "$oshome/modules/globebrowsing/ext/gdal/include"
        Write-Host "Clearing bundled gdal headers from $gdalInclude ..."
        if (Test-Path $gdalInclude) {
          Remove-Item "$gdalInclude\*" -Recurse -Force
        } else {
          New-Item -ItemType Directory -Force -Path $gdalInclude | Out-Null
        }
        Write-Host "Copying vcpkg gdal headers to $gdalInclude ..."
        Copy-Item "$vcpkgInclude\gdal*"  $gdalInclude -Force -ErrorAction SilentlyContinue
        Copy-Item "$vcpkgInclude\ogr*"   $gdalInclude -Force -ErrorAction SilentlyContinue
        Copy-Item "$vcpkgInclude\cpl*"   $gdalInclude -Force -ErrorAction SilentlyContinue
        Copy-Item "$vcpkgInclude\gnm*"   $gdalInclude -Force -ErrorAction SilentlyContinue
        Copy-Item "$vcpkgInclude\vrt*"   $gdalInclude -Force -ErrorAction SilentlyContinue
        $count = (Get-ChildItem $gdalInclude).Count
        Write-Host "Copied $count header files to $gdalInclude"
        if ($count -eq 0) { Write-Error "No gdal headers found in vcpkg include dir"; exit 1 }
    
        # --- Empty stubs for disabled features ---
        # Create-EmptyLib "$oshome/apps/OpenSpace/ext/sgct/ext/scalable" "mplEasyBlendSDK.lib"
        Create-EmptyLib "$oshome/apps/OpenSpace/ext/sgct/ext/spout"    "SpoutLibrary.lib"
        Create-EmptyLib "$oshome/apps/OpenSpace/ext/spout"             "SpoutLibrary.lib"
        Create-EmptyLib "$oshome/apps/OpenSpace-MinVR/ext/spout"       "SpoutLibrary.lib"
        Create-EmptyLib "$oshome/modules/spout/ext/spout"              "SpoutLibrary.lib"
        Create-EmptyLib "$oshome/apps/OpenSpace/ext/sgct/ext/ndi/lib"  "Processing.NDI.Lib.x64.lib"

        Create-StubLib "$oshome/apps/OpenSpace/ext/sgct/ext/scalable" "mplEasyBlendSDK.lib"
    
        Write-Host "All patches applied."

    - name: Patch SGCT to disable Scalable SDK on ARM64
      run: |
        $file = "$env:openSpaceHome/apps/OpenSpace/ext/sgct/CMakeLists.txt"
        (Get-Content $file -Raw).Replace(
          'option(SGCT_DEP_INCLUDE_SCALABLE "Include Scalable SDK" ON)',
          'option(SGCT_DEP_INCLUDE_SCALABLE "Include Scalable SDK" OFF)'
        ) | Set-Content $file -NoNewline
        Write-Host "Patched SGCT_DEP_INCLUDE_SCALABLE to OFF"

    - name: Patch for not using bundled x64 libcurl dlls
      run: |
        $file = "$env:openSpaceHome/ext/CMakeLists.txt"
        (Get-Content $file -Raw).Replace(
          'if (WIN32)',
          'if (WIN32 AND NOT CMAKE_GENERATOR_PLATFORM STREQUAL "ARM64")'
        ) | Set-Content $file -NoNewline
        Write-Host "Patched for not using bundled x64 libcurl dlls"

        
    - name: Configure CMake
      env:
        LIB: "C:/vcpkg/installed/arm64-windows/lib;${{ env.LIB }}"
      run: |
        cd "$env:openSpaceHome"
        cmake -S . -B build -G "Visual Studio 17 2022" -A ARM64 -DCMAKE_BUILD_TYPE="RelWithDebInfo" -DSGCT_DEP_INCLUDE_ZLIB=OFF `
        -DASSIMP_BUILD_ZLIB=OFF `
        -DCDF_BUILD_ZLIB=OFF `
        -DCDF_USE_ZLIB=ON-DBUILD_TESTS=OFF -DOPENSPACE_HAVE_TESTS=OFF -DSGCT_BUILD_TESTS=OFF `
        -DGHOUL_HIGH_DEBUG_MODE=OFF -DGHOUL_HAVE_TESTS=OFF -DOPENSPACE_MODULE_MOLECULE=OFF `
        -DOPENSPACE_MODULE_SOLARBROWSING=OFF `
        -DOPENSPACE_MODULE_SPOUT=OFF -DSGCT_SPOUT_SUPPORT=OFF -DSGCT_NDI_SUPPORT=OFF `
        -DSGCT_SCALABLE_SUPPORT=OFF -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
        -DVCPKG_TARGET_TRIPLET=arm64-windows -DOPENSPACE_MODULE_VIDEO=OFF `
        -DCMAKE_PREFIX_PATH="C:/vcpkg/installed/arm64-windows"
  

    - name: Patch dr_mp3 for MSVC ARM64 (disable SIMD)
      if: runner.os == 'Windows' && runner.arch == 'ARM64'
      shell: pwsh
      run: |
        $file = "source/OpenSpace/modules/audio/ext/soloud/src/audiosource/wav/dr_impl.cpp"
    
        Write-Host "Patching $file"
    
        $content = Get-Content $file -Raw
    
        if ($content -match "DR_MP3_NO_SIMD") {
          Write-Host "DR_MP3_NO_SIMD already present, skipping patch"
          exit 0
        }
    
        $patched = $content -replace `
          "#define DR_MP3_FLOAT_OUTPUT\s*\r?\n", `
          "#define DR_MP3_FLOAT_OUTPUT`r`n#define DR_MP3_NO_SIMD`r`n"
    
        Set-Content -Path $file -Value $patched -NoNewline
    
        Write-Host "Patch applied successfully"


    - name: Build
      env:
        LIB: "C:/vcpkg/installed/arm64-windows/lib;${{ env.LIB }}"
        
      # Build your program with the given configuration
      run: |
        cd $env:openSpaceHome
        cmake --build ./build --config RelWithDebInfo
 
    - name: Upload Artifact only bin
      uses: actions/upload-artifact@v7
      with:
        # Artifact name
        name: OpenSpace-bindirectory-zip
        # optional, default is artifact
        # A file, directory or wildcard pattern that describes what to upload
        path: ${{ env.openSpaceHome }}/bin/**

    - name: Deploy
      # Build and deploy your program with the given configuration
      run: |
        cd $env:openSpaceHome
        # ./deploy.bat This fails, probably due to warnings which are treated as errors, and CMake flags

    - name: Copy vcpkg ARM64 DLLs to bin/RelWithDebInfo
      run: |
        $vcpkgBin = "$env:VCPKG_ROOT/installed/arm64-windows/bin"
        $dest = "$env:openSpaceHome/bin/RelWithDebInfo"
        $dlls = Get-ChildItem $vcpkgBin -Filter "*.dll"
        Write-Host "Found $($dlls.Count) DLLs in ${vcpkgBin}:"
        $dlls | ForEach-Object {
          Write-Host "  Copying $($_.Name)"
          Copy-Item $_.FullName $dest -Force
        }
        Write-Host "Done."
    
    - name: Prepare and deploy
      shell: cmd
      run: |
        cd /d "%openSpaceHome%"
        echo ### copied from deploy.bat commit 4bf8124
 
        :PostBuildCleanup
        echo ### Dealing with some files
        :: Remove unnecessary files of our own making
        del bin\RelWithDebInfo\*.pdb
        del bin\RelWithDebInfo\codegen.exe
        del bin\RelWithDebInfo\Qt6Svg.dll
        
        :: Remove unnecessary Qt files
        rmdir /S /Q bin\RelWithDebInfo\iconengines
        rmdir /S /Q bin\RelWithDebInfo\imageformats
        rmdir /S /Q bin\RelWithDebInfo\networkinformation
        
        :: The binary files are created in the RelWithDebInfo subdirectory and we want them in bin
        robocopy bin\\RelWithDebInfo bin /E /MOV
        rmdir /S /Q bin\\RelWithDebInfo

        :: Comparing with official release, found that QT dlls need to be bundled.
           
        @echo off
        REM Path variables
        set "QtBin=${{ env.QT_DIR }}\bin"
        set "QtPlugins=${{ env.QT_DIR }}\plugins"
        set "TargetBin=${{ env.openSpaceHome }}\bin"
        
        echo Copying required Qt runtime DLLs from %QtBin% to %TargetBin%...
        
        REM Ensure directories exist
        if not exist "%TargetBin%\platforms" mkdir "%TargetBin%\platforms"
        if not exist "%TargetBin%\styles" mkdir "%TargetBin%\styles"
        if not exist "%TargetBin%\tls" mkdir "%TargetBin%\tls"
        if not exist "%TargetBin%\generic" mkdir "%TargetBin%\generic"
        
        REM Copy essential DLLs (OpenGL + DirectX)
        for %%d in (dxcompiler.dll dxil.dll opengl32sw.dll) do (
          if exist "%QtBin%\%%d" (
            copy /Y "%QtBin%\%%d" "%TargetBin%\" >nul
            echo Copied %%d
          ) else (
            echo WARNING: Missing %%d in %QtBin%
          )
        )
        
        REM Copy platform plugin (mandatory)
        copy /Y "%QtPlugins%\platforms\qwindows.dll" "%TargetBin%\platforms\" >nul
        echo Copied qwindows.dll
        
        REM Copy optional style plugin (UI style)
        if exist "%QtPlugins%\styles\qmodernwindowsstyle.dll" (
          copy /Y "%QtPlugins%\styles\qmodernwindowsstyle.dll" "%TargetBin%\styles\" >nul
          echo Copied qmodernwindowsstyle.dll
        )
        
        REM Copy optional TLS backends (network/SSL)
        for %%d in (qcertonlybackend.dll qopensslbackend.dll qschannelbackend.dll) do (
          if exist "%QtPlugins%\tls\%%d" (
            copy /Y "%QtPlugins%\tls\%%d" "%TargetBin%\tls\" >nul
            echo Copied %%d
          )
        )
        
        REM Copy optional generic plugin (TUIO touch)
        if exist "%QtPlugins%\generic\qtuiotouchplugin.dll" (
          copy /Y "%QtPlugins%\generic\qtuiotouchplugin.dll" "%TargetBin%\generic\" >nul
          echo Copied qtuiotouchplugin.dll
        )
        
        echo Qt runtime DLLs copy completed.
        
        :: Download the Microsoft redistributable
        curl "https://aka.ms/vs/17/release/vc_redist.arm64.exe" --output vc_redist.arm64.exe -L
        
        echo ### Create main zip file
        :: Need to manually add any new weird paths that don't match the wildcards below
        7z.exe a -tzip -mx=9 -mfb=257 -mpass=15 OpenSpace-minimal-daily-Windows-11-arm64.zip^
          bin/*^
          config/*^
          data/*^
          documentation/*^
          scripts/*^
          shaders/*^
          ACKNOWLEDGMENTS.md^
          CITATION.cff^
          COMMIT.md^
          CREDITS.md^
          LICENSE.md^
          openspace.cfg^
          README.md^
          vc_redist.arm64.exe^
          ^
          modules/*/shaders/*^
          modules/*/scripts/*^
          modules/globebrowsing/gdal_data/*^
          modules/webgui/ext/nodejs/node.exe^
          ^
          %sync%^
          -x!documentation/.git
              
    
    - name: Upload Artifact minimal
      uses: actions/upload-artifact@v4
      with:
        # Artifact name
        name: OpenSpace-daily-minimal
        # optional, default is artifact
        # A file, directory or wildcard pattern that describes what to upload
        path: ${{ env.openSpaceHome }}/OpenSpace-minimal-daily-Windows-11-arm64.zip

    - name: Upload .zip to GitHub Release - Windows
      run: |
        $RELEASE_TAG = "daily-WIN-ZIP"
        $ZIP_FILE = "${{ env.openSpaceHome }}\OpenSpace-minimal-daily-Windows-11-arm64.zip"
    
        # Check if release exists
        gh release view $RELEASE_TAG > $null 2>&1
        if ($LASTEXITCODE -ne 0) {
          gh release create $RELEASE_TAG -t "OpenSpace Windows Daily Build" -n "Automated daily build of OpenSpace."
        }
    
        # Update title/notes each run
        $timestamp = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd HH:mm:ss")
        gh release edit $RELEASE_TAG `
          -t "OpenSpace Windows Daily Build" `
          -n "Automated daily build of OpenSpace (updated $timestamp UTC)."
    
        # Upload .zip asset (overwrite if exists)
        gh release upload $RELEASE_TAG $ZIP_FILE --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}
      
    
