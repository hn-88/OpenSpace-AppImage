name: arm64-appimage-daily

on: 
  workflow_dispatch:      # allows manual trigger
  schedule:
    - cron: "18 23 * * *"   # to run daily at 23:18 UTC - usually delayed by github actions congestion

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  # This yml is copied from https://github.com/hn-88/OCVWarp/blob/master/.github/workflows/cmake-nix.yml
  # and modified.
  BUILD_TYPE: Release
  # As recommended here: https://github.com/marketplace/actions/sccache-action
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_CACHE_SIZE: 5G
  CMAKE_C_COMPILER_LAUNCHER: sccache
  CMAKE_CXX_COMPILER_LAUNCHER: sccache
  OPENSPACE_VERSION: "0.22.0rc2+"
  APPIMAGE_VERSION: "2"
  # COMMIT_HASH: "389842f76cab6c7a211faa90c3c157a28df24bd6" # Aug 5 2025
  # COMMIT_HASH: "e8fa72544c445b556018841eafb48116372c288d" # Feb 13 2026
  COMMIT_HASH: "master"
  # from https://github.com/mozilla/sccache/?tab=readme-ov-file#separating-caches-between-invocations
  SCCACHE_C_CUSTOM_CACHE_BUSTER: "ubuntu-22.04-arm-cmake4.3-homebrew-gcc-qt690"
  
jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-22.04-arm

    steps:
    - uses: actions/checkout@v6
    
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: true
        
        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Install cached Qt6 (ARM64)
      env:
        QT_VERSION: '6.9.3'
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TARBALL="qt6-${QT_VERSION}-arm64-ubuntu2204.tar.xz"
        RELEASE_TAG="qt6-arm64-${QT_VERSION}"

        # Download from this repo's releases
        gh release download "$RELEASE_TAG" \
          --repo "${{ github.repository }}" \
          --pattern "$TARBALL" \
          --output "/tmp/$TARBALL"

        sudo tar -xJf "/tmp/$TARBALL" -C /

        # Set Qt environment variables for CMake and build tools
        QT_ROOT="/opt/qt6-arm64"
        echo "Qt6_DIR=${QT_ROOT}/lib/cmake/Qt6"           >> $GITHUB_ENV
        echo "Qt6Core_DIR=${QT_ROOT}/lib/cmake/Qt6Core"   >> $GITHUB_ENV
        echo "QT_ROOT_DIR=${QT_ROOT}"                      >> $GITHUB_ENV
        echo "${QT_ROOT}/bin"                              >> $GITHUB_PATH
        echo "LD_LIBRARY_PATH=${QT_ROOT}/lib:${LD_LIBRARY_PATH}" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=${QT_ROOT}/lib/pkgconfig:${PKG_CONFIG_PATH}" >> $GITHUB_ENV


    - name: Export Qt environment variables
      shell: bash
      run: |
        echo "Qt installation is at: $QT_ROOT_DIR"
        echo "CMAKE_PREFIX_PATH=$QT_ROOT_DIR" >> $GITHUB_ENV
        echo "Qt6_DIR=$QT_ROOT_DIR/lib/cmake/Qt6" >> $GITHUB_ENV
        echo "QT_DIR=$QT_ROOT_DIR" >> $GITHUB_ENV
        echo "$QT_ROOT_DIR/bin" >> $GITHUB_PATH
        find $QT_ROOT_DIR -name "libicu*"
        

    - name: Install CMake 4.3.2
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: '4.3.2'

    - name: Set up Homebrew
      uses: Homebrew/actions/setup-homebrew@master

    - name: Install GCC 13 (via Homebrew)
      run: |
        # Bypasses Launchpad entirely by downloading from GitHub's own registry
        sudo apt-get install -y software-properties-common
        brew install gcc@13
    
    - name: get openspace code for a particular release
      # https://docs.openspaceproject.com/releases-v0.20/contribute/development/compiling/ubuntu.html
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        df -h
        uname -p
        uname -m
        echo "Now git clone ..."
        git clone --recursive https://github.com/OpenSpace/OpenSpace "$openSpaceHome"
        cd "$openSpaceHome"
        # git checkout "releases/v${OPENSPACE_VERSION}" --recurse-submodules
        git checkout "${COMMIT_HASH}" --recurse-submodules
        mkdir build
        cd build

    #- name: get updated ghoul
      # https://github.com/OpenSpace/OpenSpace/issues/3880
     # run: |
        #openSpaceHome="$HOME/source/OpenSpace"
        #cd "$openSpaceHome/ext/ghoul"
        #git checkout master --recurse-submodules

    - name: patch for molecule issue
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        # sudo apt-get install libsimde-dev
        # mv  molecule-ext-mold-src-core-md_intrinsics.h "$openSpaceHome/modules/molecule/ext/mold/src/core/md_intrinsics.h" -v
        # rm -Rfv "$openSpaceHome/modules/molecule/ext/mold"
        # git clone https://github.com/scanberg/mdlib "$openSpaceHome/modules/molecule/ext/mold"
        # cd "$openSpaceHome/modules/molecule/ext/mold"
        # git checkout 70640d6eb436173a8a9b981cb580224305bfc793
        # checking out a more recent commit
        # https://github.com/OpenSpace/OpenSpace/issues/3918
        # https://github.com/OpenSpace/OpenSpace/issues/3915#issuecomment-3907061056
        # just using -DOPENSPACE_MODULE_MOLECULE=OFF
        
    
    - name: Install dependencies
      # https://docs.openspaceproject.com/releases-v0.20/contribute/development/compiling/ubuntu.html
      run: |
        sudo apt update
        sudo apt install glew-utils libpng-dev freeglut3-dev git libxrandr-dev libxinerama-dev xorg-dev libxcursor-dev libcurl4-openssl-dev libxi-dev libasound2-dev libgdal-dev libboost1.74-dev libmpv-dev libvulkan-dev        
        # sudo add-apt-repository ppa:ubuntu-toolchain-r/test <-- launchpad seems to be blocking github runners 
        # sudo apt install gcc-13 g++-13
        sudo apt-get install libasound2 libasound2-data libasound2-plugins

   
    - name: Enable sccache
      uses: mozilla-actions/sccache-action@v0.0.9

        
    - name: Configure CMake
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd "$openSpaceHome/build"
        cmake -DCMAKE_BUILD_TYPE="Release" \
        -DCMAKE_CXX_COMPILER=/home/linuxbrew/.linuxbrew/bin/g++-13 \
        -DCMAKE_C_COMPILER=/home/linuxbrew/.linuxbrew/bin/gcc-13 \
        -DCMAKE_CXX_STANDARD=23 \
        -DCMAKE_CXX_FLAGS="-static-libgcc -static-libstdc++" \
        -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++" \
        -DASSIMP_BUILD_MINIZIP=1 -DBUILD_TESTS=OFF -DOPENSPACE_MODULE_MOLECULE=OFF -DOPENSPACE_HAVE_TESTS=OFF \
        -DSGCT_BUILD_TESTS=OFF "$openSpaceHome"

    - name: Build
      # Build your program with the given configuration
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd "$openSpaceHome/build"
        # Use the system's libvulkan, not the vendored one, otherwise they might conflict
        cef_orig_dir=$(find $HOME/source/OpenSpace/build -path */Release/libcef.so | xargs dirname)
        rm -vf "$cef_orig_dir/libvulkan.so.1" || echo "libvulkan.so.1 not found, skipping removal"
        make -j $(nproc)

    - name: Create appimage directory
      working-directory: ${{github.workspace}}
      # https://appimage-builder.readthedocs.io/en/latest/hosted-services/github-actions.html
      # But instead of linuxdeployqt as in https://github.com/hn-88/OCVWarp/blob/master/.travis.yml
      # trying with go-appimage
      run: |
        echo "Creating AppImage layout..."
        mkdir -p appdir/usr/bin appdir/usr/lib appdir/usr/plugins
        
        cp $HOME/source/OpenSpace/bin/OpenSpace_Helper $HOME/source/OpenSpace/bin/OpenSpace ./appdir/usr/bin
        strip ./appdir/usr/bin/*        

        # Point directly to the executable (no run.sh dependency)
        # sed -i 's|^Exec=.*|Exec=OpenSpace|' ./appdir/OpenSpace.desktop
        mkdir -p appdir/usr/share/applications ; cp ./appdir/OpenSpace.desktop ./appdir/usr/share/applications/
        mkdir -p appdir/usr/share/icons/hicolor/256x256/apps ; cp ./appdir/OpenSpace.png ./appdir/usr/share/icons/hicolor/256x256/apps/

        # Copy resources
        cp -r $HOME/source/OpenSpace/{config/,modules/,data/,scripts/,shaders,/documentation/,openspace.cfg} ./appdir/usr/

        # Patch configuration
        patch ./appdir/usr/openspace.cfg < ./appdir/openspacef12f5e2.cfg.patch || echo "Patch already applied or skipped"

        # Delete source and build-time files
        find ./appdir/usr/ -name '*.cpp' -print0 | xargs -0 -P2 rm -f
        find ./appdir/usr/ -name 'CMakeLists.txt'  -print0 | xargs -0 -P2 rm -f
        find ./appdir/usr/ -name '*.h' -print0 | xargs -0 -P2 rm -f
        find ./appdir/usr/ -name '*.cmake' -print0 | xargs -0 -P2 rm -f

        # Download appimagetool
        wget -c https://github.com/$(wget -q https://github.com/probonopd/go-appimage/releases/expanded_assets/continuous -O - | grep "appimagetool-.*-aarch64.AppImage" | head -n 1 | cut -d '"' -f 2)
        chmod +x appimagetool-*.AppImage

        # Populate LD_LIBRARY_PATH so go-appimage deploy uses the correct lookup order
        export LD_LIBRARY_PATH="$(pwd)/appdir/usr/lib:$QT_ROOT_DIR/lib:$LD_LIBRARY_PATH"

        # Run deploy (with bundle everything flag)
        ./appimagetool-*.AppImage -s deploy appdir/usr/share/applications/OpenSpace.desktop

        # ----------------- QT BUNDLING PREPARATION -----------------
        # Copy Qt libraries to AppDir/usr/lib
        echo "Copying Qt6 libraries..."
        cp -P "$QT_ROOT_DIR"/lib/libQt6*.so* ./appdir/usr/lib/

        # Copy Qt plugins
        echo "Copying Qt6 plugins..."
        cp -r "$QT_ROOT_DIR"/plugins/* ./appdir/usr/plugins/

        # Create qt.conf next to the executable
        echo "[Paths]" > ./appdir/usr/bin/qt.conf
        echo "Prefix = .." >> ./appdir/usr/bin/qt.conf
        echo "Plugins = plugins" >> ./appdir/usr/bin/qt.conf
        echo "Imports = qml" >> ./appdir/usr/bin/qt.conf
        echo "Qml2Imports = qml" >> ./appdir/usr/bin/qt.conf
        # -----------------------------------------------------------

        
        # Explicitly bundle libmpv and its transitive deps
        echo "Bundling libmpv explicitly..."
        for lib in $(ldconfig -p | grep -E 'libmpv' | awk '{print $NF}'); do
          cp -v "$lib" ./appdir/usr/lib/ || true
        done
        (cd ./appdir/usr/lib && \
          for f in libmpv.so.*.*; do
            [ -f "$f" ] || continue
            major=$(echo "$f" | grep -oP '(?<=libmpv\.so\.)\d+')
            ln -sf "$f" "libmpv.so.${major}" 2>/dev/null || true
            ln -sf "$f" "libmpv.so"          2>/dev/null || true
          done)

        
        # Manually bundle libjack
        echo "Searching for libjack.so* on runner..."
        JACK_LIBS=$(find /usr/lib /lib /usr/local/lib \( -name "libjack.so*" -o -name "libjackserver.so*" \) 2>/dev/null | sort -u)
        if [ -n "$JACK_LIBS" ]; then
          while IFS= read -r lib; do
            cp -av "$lib" appdir/usr/lib/
          done <<< "$JACK_LIBS"
        fi
        
        # Manually place CEF files
        cef_release_dir=$(find $HOME/source/OpenSpace/build -name "libcef.so" | grep -i release | xargs dirname | head -n 1)
        cef_data_dir=$(find $HOME/source/OpenSpace/build -name "resources.pak" | xargs dirname | head -n 1)
        # cp -rv "$cef_data_dir"/*.pak ./appdir/usr/bin/
        # cp -rv "$cef_data_dir"/*.dat ./appdir/usr/bin/
        # cp -rv "$cef_data_dir"/locales ./appdir/usr/bin/
        
        cp -v "$cef_release_dir"/libcef.so    ./appdir/usr/bin/
        cp -v "$cef_release_dir"/libEGL.so    ./appdir/usr/bin/  2>/dev/null || true
        cp -v "$cef_release_dir"/libGLESv2.so ./appdir/usr/bin/  2>/dev/null || true
        cp -v "$cef_release_dir"/libvk_swiftshader.so  ./appdir/usr/bin/
        # cp -v "$cef_release_dir"/v8_context_snapshot.bin ./appdir/usr/bin/
        # cp -v "$cef_release_dir"/snapshot_blob.bin       ./appdir/usr/bin/ 2>/dev/null || true
        # cp -v "$cef_release_dir"/vk_swiftshader_icd.json ./appdir/usr/bin/ 2>/dev/null || true
        # Install chrome-sandbox with setuid so CEF can find it at initialization
        if [ -f "$cef_release_dir/chrome-sandbox" ]; then
          cp -v "$cef_release_dir/chrome-sandbox" ./appdir/usr/bin/
          chmod 4755 ./appdir/usr/bin/chrome-sandbox
        else
          echo "WARNING: chrome-sandbox not found in $cef_release_dir, CEF may crash on init"
        fi
        
        strip --strip-unneeded ./appdir/usr/bin/libcef.so || true
        # Symlink critical helper libraries so dynamic loader resolves them from usr/lib
        ln -sf ../bin/libcef.so ./appdir/usr/lib/libcef.so
        ln -sf ../bin/libEGL.so ./appdir/usr/lib/libEGL.so || true
        ln -sf ../bin/libGLESv2.so ./appdir/usr/lib/libGLESv2.so || true
        ln -sf ../bin/libvk_swiftshader.so ./appdir/usr/lib/libvk_swiftshader.so || true
        # move CEF resources also to usr/lib
        # currently not duplicated in bin for testing
        cp -rv "$cef_data_dir"/*.pak ./appdir/usr/lib/
        cp -rv "$cef_data_dir"/*.dat ./appdir/usr/lib/        
        cp -rv "$cef_data_dir"/locales ./appdir/usr/lib/
        cp -v "$cef_release_dir"/v8_context_snapshot.bin ./appdir/usr/lib/
        cp -v "$cef_release_dir"/snapshot_blob.bin       ./appdir/usr/lib/ 2>/dev/null || true
        cp -v "$cef_release_dir"/vk_swiftshader_icd.json ./appdir/usr/lib/ 2>/dev/null || true
                
        # Clean up stray Homebrew directories and move libs to usr/lib
        if [ -d "./appdir/home" ]; then
          mv ./appdir/home/linuxbrew/.linuxbrew/lib/liblz4.so.1   ./appdir/usr/lib/ 2>/dev/null || true
          mv ./appdir/home/linuxbrew/.linuxbrew/lib/liblzma.so.5  ./appdir/usr/lib/ 2>/dev/null || true
          mv ./appdir/home/linuxbrew/.linuxbrew/lib/libzstd.so.1  ./appdir/usr/lib/ 2>/dev/null || true
          rm -vfr ./appdir/home
        fi

        # ----------------- UNIFY LIBRARY DIRECTORIES -----------------
        if [ -d "./appdir/lib" ]; then
          echo "Merging bundled libraries from appdir/lib into appdir/usr/lib..."
          mkdir -p ./appdir/usr/lib
          find ./appdir/lib -name "*.so*" -exec cp -avP {} ./appdir/usr/lib/ \;
          rm -rf ./appdir/lib
        fi
        # -------------------------------------------------------------

        # ----------------- GLOBAL PRECISE DEPENDENCY RESOLUTION -----------------
        echo "Performing precise global dependency resolution..."
        
        # Disable exit-on-error and pipefail temporarily so empty grep matches do not crash the build
        set +e
        set +o pipefail

        # Ultra-precise exclusion regex targeting ONLY glibc, low-level runtime layers, and graphics drivers
        # This protects libraries like libcfitsio, libcurl, or libcrypto while excluding system frameworks
        EXCLUDE_REGEXP="^(ld-linux.*\.so|ld-[0-9].*\.so|libc\.so|libc-[0-9].*\.so|libm\.so|libm-[0-9].*\.so|libdl\.so|libdl-[0-9].*\.so|libpthread|librt\.so|librt-[0-9].*\.so|libresolv.*\.so|libnss.*\.so|libutil.*\.so|libcrypt\.so|libanl.*\.so|libgcc_s.*\.so|libstdc|libglapi|libGL.*\.so|libEGL.*\.so|libGLES.*\.so|libvulkan.*\.so|libdrm.*\.so|libgbm.*\.so|libnvidia|libva.*\.so|libvdpau.*\.so|libX11|libxcb|libdbus|libasound.*\.so|libudev.*\.so|libgobject|libgio|libglib|libgthread|libgmodule|libffi)"

        # Initialize tracing queue with all existing ELF files in usr/lib and usr/bin
        TO_CHECK=()
        for f in $(find ./appdir/usr/lib ./appdir/usr/bin -type f \( -name "*.so*" -o -name "OpenSpac*" \) 2>/dev/null); do
          if file "$f" | grep -q ELF; then
            TO_CHECK+=("$f")
          fi
        done

        declare -A PROCESSED
        
        while [ ${#TO_CHECK[@]} -gt 0 ]; do
          # Pop the first library from the queue
          CURRENT_LIB="${TO_CHECK[0]}"
          TO_CHECK=("${TO_CHECK[@]:1}")
          
          if [ -n "${PROCESSED[$CURRENT_LIB]}" ]; then
            continue
          fi
          PROCESSED[$CURRENT_LIB]=1
          
          echo "Scanning: $(basename "$CURRENT_LIB")"
          deps=$(ldd "$CURRENT_LIB" 2>/dev/null | grep "=>" | awk '{print $3}' | grep '^/')
          for dep in $deps; do
            dep_name=$(basename "$dep")
            
            # Skip core system libraries and driver libraries
            if [[ "$dep_name" =~ $EXCLUDE_REGEXP ]]; then
              continue
            fi
            
            target_path="./appdir/usr/lib/$dep_name"
            if [ ! -f "$target_path" ]; then
              echo "  -> Copying dependency: $dep"
              cp -vL "$dep" ./appdir/usr/lib/ || true
              # Add the newly copied library to the queue to trace its dependencies transitively
              TO_CHECK+=("$target_path")
            fi
          done
        done

        # Restore standard GitHub Actions exit-on-error behavior
        set -e
        set -o pipefail
        # -------------------------------------------------------------------------

        # Bundle high-version libstdc++ from Homebrew
        libstdcxx_path=$(find /home/linuxbrew/.linuxbrew -name "libstdc++.so.6" -not -type l | head -n 1)
        if [ -n "$libstdcxx_path" ]; then
          echo "Bundling GCC 13 libstdc++ from Homebrew: $libstdcxx_path"
          cp -vf "$libstdcxx_path" ./appdir/usr/lib/
          (cd ./appdir/usr/lib && ln -sf $(basename "$libstdcxx_path") libstdc++.so.6)
          (cd ./appdir/usr/lib && ln -sf $(basename "$libstdcxx_path") libstdc++.so)
        fi

        # Bundle HarfBuzz from Homebrew to match the pango version bundled above.
        # The arm64 system HarfBuzz on Ubuntu 24.04 targets is too old (missing
        # hb_ot_color_has_paint) relative to the pango that go-appimage deploys,
        # causing a symbol lookup error at runtime. Homebrew GCC 13 pulls in a
        # newer HarfBuzz that is consistent with the bundled pango.
        hb_path=$(find /home/linuxbrew/.linuxbrew -name "libharfbuzz.so.0.*" -not -type l | head -n 1)
        if [ -n "$hb_path" ]; then
          echo "Bundling HarfBuzz from Homebrew: $hb_path"
          cp -vf "$hb_path" ./appdir/usr/lib/
          (cd ./appdir/usr/lib && ln -sf "$(basename "$hb_path")" libharfbuzz.so.0)
          (cd ./appdir/usr/lib && ln -sf "$(basename "$hb_path")" libharfbuzz.so)
        else
          echo "WARNING: Homebrew HarfBuzz not found, falling back to system version"
          echo "Installed HarfBuzz candidates:"
          find /home/linuxbrew/.linuxbrew -name "libharfbuzz*" | sort
        fi

        # Also bundle libharfbuzz-subset and libharfbuzz-gobject if present,
        # as pango may pull these in transitively on some systems.
        for hb_extra in libharfbuzz-subset libharfbuzz-gobject; do
          hb_extra_path=$(find /home/linuxbrew/.linuxbrew -name "${hb_extra}.so.0.*" -not -type l | head -n 1)
          if [ -n "$hb_extra_path" ]; then
            echo "Bundling ${hb_extra} from Homebrew: $hb_extra_path"
            cp -vf "$hb_extra_path" ./appdir/usr/lib/
            (cd ./appdir/usr/lib && ln -sf "$(basename "$hb_extra_path")" ${hb_extra}.so.0)
            (cd ./appdir/usr/lib && ln -sf "$(basename "$hb_extra_path")" ${hb_extra}.so)
          fi
        done

    - name: Audit bundled libraries
      run: |
        echo "=== All bundled .so files ==="
        find appdir/usr/lib -name "*.so*" -type f | sort
        echo ""
        echo "=== Checking for unresolved deps ==="
        find appdir/usr/bin appdir/usr/lib -type f \( -name "*.so*" -o -name "OpenSpac*" \) | while read f; do
          file "$f" | grep -q ELF || continue
          ldd "$f" 2>/dev/null | grep "not found" | while read line; do
            echo "MISSING in $(basename $f): $line"
          done
        done

    - name: Fix AppImage (interpreter + audit)
      run: |
        set -e

        echo "=== Purging bundled glibc (must always come from host) ==="
        rm -f ./appdir/usr/lib/libc.so*
        rm -f ./appdir/usr/lib/libc-*.so*
        rm -f ./appdir/usr/lib/libm.so*
        rm -f ./appdir/usr/lib/libm-*.so*
        rm -f ./appdir/usr/lib/libdl.so*
        rm -f ./appdir/usr/lib/libpthread.so*
        rm -f ./appdir/usr/lib/librt.so*
        rm -f ./appdir/usr/lib/ld-linux*.so*
        rm -f ./appdir/usr/lib/ld-*.so*

        echo "=== Replacing Homebrew-sourced libs with system equivalents ==="
        for lib in liblzma liblz4 libzstd libbrotlidec libbrotlicommon; do
          sys_lib=$(find /usr/lib/aarch64-linux-gnu -name "${lib}.so*" -not -type l | head -n 1)
          if [ -n "$sys_lib" ]; then
            echo "Replacing bundled ${lib} with system: $sys_lib"
            cp -vf "$sys_lib" ./appdir/usr/lib/
          fi
        done

        echo "=== Collecting ELF binaries ==="
        ELF_FILES=$(find appdir/usr/bin appdir/usr/lib -type f \( -executable -o -name "*.so*" \) -exec file {} \; | grep ELF | cut -d: -f1)

        echo "=== Fixing ELF interpreter (executables only) ==="
        for f in $ELF_FILES; do
          if file "$f" | grep -q "executable"; then
            echo "Patching interpreter: $f"
            patchelf --set-interpreter /lib/ld-linux-aarch64.so.1 "$f" || true
          fi
        done

        echo "=== Overwriting go-appimage AppRun with lightweight custom launcher ==="
        rm -f appdir/AppRun
        echo '#!/bin/sh'                                                                                                           >> appdir/AppRun
        echo ''                                                                                                                    >> appdir/AppRun
        echo '# Source user environment files to pick up custom exports'                                                           >> appdir/AppRun
        echo '# (e.g. OPENSPACE_GLOBEBROWSING, OPENSPACE_SYNC set in ~/.bashrc or ~/.profile)'                                    >> appdir/AppRun
        echo 'for f in "$HOME/.profile" "$HOME/.bash_profile" "$HOME/.bashrc"; do'                                                >> appdir/AppRun
        echo '    [ -r "$f" ] && . "$f"'                                                                                           >> appdir/AppRun
        echo 'done'                                                                                                                >> appdir/AppRun
        echo ''                                                                                                                    >> appdir/AppRun
        echo 'if [ -z "$OPENSPACE_USER" ]; then'                                                                                   >> appdir/AppRun
        echo '    export OPENSPACE_USER="$HOME/OpenSpace/user"'                                                                    >> appdir/AppRun
        echo 'fi'                                                                                                                  >> appdir/AppRun
        echo ''                                                                                                                    >> appdir/AppRun
        echo 'HERE="$(dirname "$(readlink -f "${0}")")"'                                                                           >> appdir/AppRun
        echo 'export APPDIR="${HERE}"'                                                                                             >> appdir/AppRun
        echo 'export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/usr/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"'                    >> appdir/AppRun
        echo 'export QT_QPA_PLATFORM_PLUGIN_PATH="${HERE}/usr/plugins"'                                                           >> appdir/AppRun
        echo ''                                                                                                                    >> appdir/AppRun
        echo 'OPENSPACE_BIN="${HERE}/usr/bin/OpenSpace"'                                                                           >> appdir/AppRun
        echo ''                                                                                                                    >> appdir/AppRun
        echo '# Try terminal emulators in order of preference'                                                                     >> appdir/AppRun
        echo 'for TERM_EMU in xterm konsole gnome-terminal xfce4-terminal lxterminal mate-terminal tilix kitty alacritty; do'     >> appdir/AppRun
        echo '    if command -v "$TERM_EMU" > /dev/null 2>&1; then'                                                               >> appdir/AppRun
        echo '        case "$TERM_EMU" in'                                                                                         >> appdir/AppRun
        echo '            xterm)'                                                                                                  >> appdir/AppRun
        echo '                exec xterm -title "OpenSpace" -e "$OPENSPACE_BIN" "$@" ;;'                                          >> appdir/AppRun
        echo '            konsole)'                                                                                                >> appdir/AppRun
        echo '                exec konsole --noclose -e "$OPENSPACE_BIN" "$@" ;;'                                                 >> appdir/AppRun
        echo '            gnome-terminal)'                                                                                         >> appdir/AppRun
        echo '                exec gnome-terminal --wait -- "$OPENSPACE_BIN" "$@" ;;'                                             >> appdir/AppRun
        echo '            xfce4-terminal)'                                                                                         >> appdir/AppRun
        echo '                exec xfce4-terminal --disable-server -x "$OPENSPACE_BIN" "$@" ;;'                                   >> appdir/AppRun
        echo '            lxterminal)'                                                                                             >> appdir/AppRun
        echo '                exec lxterminal -e "$OPENSPACE_BIN" "$@" ;;'                                                        >> appdir/AppRun
        echo '            mate-terminal)'                                                                                          >> appdir/AppRun
        echo '                exec mate-terminal -e "$OPENSPACE_BIN" "$@" ;;'                                                     >> appdir/AppRun
        echo '            tilix)'                                                                                                  >> appdir/AppRun
        echo '                exec tilix -e "$OPENSPACE_BIN" "$@" ;;'                                                             >> appdir/AppRun
        echo '            kitty)'                                                                                                  >> appdir/AppRun
        echo '                exec kitty -- "$OPENSPACE_BIN" "$@" ;;'                                                             >> appdir/AppRun
        echo '            alacritty)'                                                                                              >> appdir/AppRun
        echo '                exec alacritty -e "$OPENSPACE_BIN" "$@" ;;'                                                         >> appdir/AppRun
        echo '        esac'                                                                                                        >> appdir/AppRun
        echo '    fi'                                                                                                              >> appdir/AppRun
        echo 'done'                                                                                                                >> appdir/AppRun
        echo ''                                                                                                                    >> appdir/AppRun
        echo '# Fallback: no terminal found, run directly with a warning'                                                          >> appdir/AppRun
        echo 'echo "Warning: No terminal emulator found. Running OpenSpace without console output." >&2'                           >> appdir/AppRun
        echo 'echo "Install xterm for console output: sudo apt install xterm" >&2'                                                 >> appdir/AppRun
        echo 'exec "$OPENSPACE_BIN" "$@"'                                                                                          >> appdir/AppRun
        chmod +x appdir/AppRun
        
        # Make loader executable in case any bundled ELF has it hardcoded as interpreter
        find appdir/usr/lib -name "ld-linux*.so*" -exec chmod +x {} \; 2>/dev/null || true
        
        # Satisfy any find calls on lib/ in the squashfs runtime
        mkdir -p appdir/lib

        echo "=== Scanning bundled libs for glibc version requirements ==="
        OFFENDERS=""
        while IFS= read -r lib; do
          max=$(strings "$lib" 2>/dev/null | grep -oP 'GLIBC_\d+\.\d+' | sort -V | tail -1)
          if [ -n "$max" ]; then
            if [ "$(printf '%s\n' "GLIBC_2.35" "$max" | sort -V | head -1)" != "$max" ]; then
              echo "OFFENDING LIB (requires $max): $lib"
              OFFENDERS="$OFFENDERS $lib"
            fi
          fi
        done < <(find appdir/usr/lib -name "*.so*" -type f)
        if [ -n "$OFFENDERS" ]; then
          echo "ERROR: The above bundled libs require glibc newer than 2.35."
          exit 1
        fi

        echo "=== GLIBC compatibility check (main binary) ==="
        MAX_GLIBC=$(strings appdir/usr/bin/OpenSpace | grep GLIBC_ | sort -V | tail -1)
        echo "Max GLIBC required by OpenSpace binary: $MAX_GLIBC"
        if [ "$(printf '%s\n' "GLIBC_2.35" "$MAX_GLIBC" | sort -V | head -1)" != "$MAX_GLIBC" ]; then
          echo "ERROR: OpenSpace binary requires newer glibc than Ubuntu 22.04!"
          exit 1
        fi
        echo "GLIBC requirement OK"
        
