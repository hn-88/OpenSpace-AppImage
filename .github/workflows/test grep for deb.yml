name: test grep for deb

on: 
  workflow_dispatch:      # allows manual trigger
  #schedule:
  #  - cron: "3 6 * * *"   # runs daily at 06:03 UTC

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  # This yml is copied from https://github.com/hn-88/OCVWarp/blob/master/.github/workflows/cmake-nix.yml
  # and modified.
  BUILD_TYPE: Release
  OPENSPACE_VERSION: "0.22.0rc1"
  APPIMAGE_VERSION: "1"
  # COMMIT_HASH: "0bec798cb39c2765373283a21312478d3d2e3c7f"
  COMMIT_HASH: "master"
  
jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v6
        
    
    
    - name: get openspace code for a particular release
      # https://docs.openspaceproject.com/releases-v0.20/contribute/development/compiling/ubuntu.html
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        git clone --recursive https://github.com/OpenSpace/OpenSpace "$openSpaceHome"
        cd "$openSpaceHome"
        git checkout "${COMMIT_HASH}" --recurse-submodules
        # try the latest main branch, one of the latest commits
        mkdir build
    
        
        
    - name: Install cmakelists patches
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cp -vf deb-patches/*.diff "$openSpaceHome"
        cd $openSpaceHome
        git apply --verbose --recount --whitespace=fix fix-Windows-Cpack-zip.diff
        
    - name: Install deb patches
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd $openSpaceHome
        git apply --verbose --recount --whitespace=fix DebwithCPack.diff

    - name: Install png for deb
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cp -vf deb-patches/openspace.png "$openSpaceHome/support/deb/openspace.png"

  
    - name: grep for problematic path
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd $openSpaceHome
        grep -rn "compute_aabb\|space_fill\|shader.*path\|SHADER_DIR\|mold.*shader" \
          modules/molecule/ext/mold/src/ --include="*.cpp" --include="*.h" --include="*.cmake"
        echo "Now check for CMake-side path injection..."
        grep -rn "configure_file\|SHADER_DIR\|MOLD_DIR\|__FILE__" \
            modules/molecule/ext/mold/ --include="CMakeLists.txt" -l
        echo " how mold actually opens the shader files at runtime."
        grep -rn "compile_shader_from_file\|MD_SHADER_DIR\|fopen\|shader_dir\|shader_path" \
          modules/molecule/ext/mold/src/ --include="*.c" --include="*.h" | head -60
        echo "And also"
        grep -rn "compile_shader_from_file\|MD_SHADER_DIR" \
          modules/molecule/ --include="*.cpp" --include="*.h" --include="*.c" | head -40


      
    
