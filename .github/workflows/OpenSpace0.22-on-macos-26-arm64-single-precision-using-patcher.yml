name: OpenSpace0.22-on-macos-26-arm64-single-precision-using-patcher

on: 
  workflow_dispatch:      # allows manual trigger
  # schedule:
  #   - cron: "0 2 * * *"   # runs daily at 02:00 UTC

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  # This yml is copied from https://github.com/hn-88/OpenSpace-AppleSiliconMac/blob/main/.github/workflows/hn-xcode16-build-hn-arm64.yml
  # and modified.
  BUILD_TYPE: Release
  OPENSPACE_VERSION: "0.22.0plus"
  THIS_REPO_PATH: "/Users/runner/work/OpenSpace-AppImage/OpenSpace-AppImage" 
  
jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    # https://github.com/actions/runner-images/blob/main/images/macos/macos-14-arm64-Readme.md
    runs-on: macos-26

    steps:
    - uses: actions/checkout@main
    
    - name: get openspace code for a particular release
      # https://docs.openspaceproject.com/releases-v0.20/contribute/development/compiling/macos.html
      run: |
        df -h
        openSpaceHome="$HOME/source/OpenSpace"
        git clone --recursive https://github.com/OpenSpace/OpenSpace.git "$openSpaceHome"
        cd "$openSpaceHome"
        # use the main branch instead # git checkout "releases/v${OPENSPACE_VERSION}" --recurse-submodules
        # git checkout "296081379b18da62686d2c0635c2478daae1b68b" --recurse-submodules
        git checkout master --recurse-submodules
        mkdir build
        cd build

    - name: revert OpenGL 4.6 to 4.1
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cp -v MacOS-patches/0.22/OpenGLrevert/ghoul-opengl41-macos.patch "$openSpaceHome/ext/ghoul/ghoul-opengl41-macos.patch"
        cd "$openSpaceHome/ext/ghoul"
        echo "Dry run"
        git apply --check ghoul-opengl41-macos.patch
        echo "Now apply for real"
        git apply --3way --verbose --recount --whitespace=fix ghoul-opengl41-macos.patch

    - name: revert sgct OpenGL 4.6 to 4.1
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cp -v MacOS-patches/0.22/OpenGLrevert/sgct-revert-to-41.diff "$openSpaceHome/apps/OpenSpace/ext/sgct/sgct-revert-to-41.diff"
        cp -v MacOS-patches/smart_patcher.py "$openSpaceHome/apps/OpenSpace/ext/sgct/smart_patcher.py"
        cd "$openSpaceHome/apps/OpenSpace/ext/sgct"
        python3 smart_patcher.py sgct-revert-to-41.diff

    - name: patches for MacOS
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        echo "Reinstate files deleted when MacOS support was removed from OpenSpace codebase..."
        cp -v MacOS-patches/include-openspace-interaction-touchbar.h "$openSpaceHome/include/openspace/interaction/touchbar.h"
        cp -v MacOS-patches/src-interaction-touchbar.mm "$openSpaceHome/src/interaction/touchbar.mm"
        cp -v MacOS-patches/modules-base-shaders-renderabletrail_apple_fs.glsl "$openSpaceHome/modules/base/shaders/renderabletrail_apple_fs.glsl"
        cp -v MacOS-patches/modules-base-shaders-renderabletrail_apple_vs.glsl "$openSpaceHome/modules/base/shaders/renderabletrail_apple_vs.glsl"
        cp -v MacOS-patches/Ghoul-src-filesystem-filesystem.osx.cpp "$openSpaceHome/ext/ghoul/src/filesystem/filesystem.osx.cpp"

        cp -v MacOS-patches/0.22/MacOS-forward-diff.patch "$openSpaceHome/MacOS-forward-diff.patch"
        cp -v MacOS-patches/0.22/reinstate-mac-support-ghoul.patch "$openSpaceHome/reinstate-mac-support-ghoul.patch"
        cp -v MacOS-patches/0.22/reinstate-mac-support-openspace.patch "$openSpaceHome/reinstate-mac-support-openspace.patch"
        cp -v MacOS-patches/0.22/reinstate-mac-support-sgct.patch "$openSpaceHome/reinstate-mac-support-sgct.patch"
        cp -v MacOS-patches/0.22/gdal3dot13compat.patch "$openSpaceHome/gdal3dot13compat.patch"
        cp -v MacOS-patches/smart_patcher.py "$openSpaceHome/smart_patcher.py"
        cd "$openSpaceHome"
        # python3 reverse_patch.py MacOS-reverse-diff-edited.patch
        python3 smart_patcher.py reinstate-mac-support-ghoul.patch
        python3 smart_patcher.py reinstate-mac-support-openspace.patch
        python3 smart_patcher.py reinstate-mac-support-sgct.patch
        python3 smart_patcher.py MacOS-forward-diff.patch
        python3 smart_patcher.py gdal3dot13compat.patch
        

    - name: smart_patcher for MacOS
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cp -v MacOS-patches/smart_patcher.py "$openSpaceHome/smart_patcher.py"
        cp -v MacOS-patches/0.22/MacOS-patches.txt "$openSpaceHome/MacOS-patches.txt"
        cd "$openSpaceHome"
        python3 smart_patcher.py MacOS-patches.txt        
        
    - name: get the single precision patches
      # https://docs.openspaceproject.com/releases-v0.20/contribute/development/compiling/macos.html
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd "$openSpaceHome"
        git clone https://github.com/hn-88/OpenSpace-single-precision.git
        cd OpenSpace-single-precision
        cp -v ghoul-patches/* "$openSpaceHome"
        cp -v diff-files/* "$openSpaceHome"
        cd "$openSpaceHome"
        #mv -v uniform_conversion.h ext/ghoul/src/opengl/uniform_conversion.h
        #mv -v ghoul-src-opengl-programobject.cpp ext/ghoul/src/opengl/programobject.cpp
        #python smart_patcher.py applesilicon.diffedited.txt
        # check for doubles in glsl files which might have remained
        GREP_OUTPUT=$(grep -rEn --include="*.glsl" --include="*.hglsl" --color=always "\b(double|dvec[234]?|dmat[234]?)\b" . || true)
        if [ -n "$GREP_OUTPUT" ]; then
          echo "Warning: Found double precision types in GLSL files:"
          echo "$GREP_OUTPUT"
        else
          echo "✓ No double precision types found in GLSL files"
        fi
        echo "Running smart_patcher for shader edits..."
        #python smart_patcher.py changes-to-shaders.diff
        python smart_patcher.py changes-to-shadersv2.diff
            
    - name: Disable std::execution parallel policies (unsupported on macOS libc++)
      run: |
        set -euo pipefail
        openSpaceHome="$HOME/source/OpenSpace"
    
        FILES=$(grep -rlE 'std::execution::(par_unseq|par)\b' \
          --include='*.cpp' --include='*.h' --include='*.hpp' --include='*.inl' \
          --exclude-dir=ext --exclude-dir=build \
          "$openSpaceHome" || true)
    
        if [ -z "$FILES" ]; then
          echo "No occurrences of std::execution::par/par_unseq found."
          exit 0
        fi
    
        echo "Commenting out std::execution::par/par_unseq in:"
        echo "$FILES"
    
        for f in $FILES; do
          sed -E -i '' \
            '/std::execution::(par_unseq|par)\b/ s/^([[:space:]]*)([^[:space:]])/\1\/\/ \2/' \
            "$f"
        done
    
        echo "--- Diff of changes ---"
        git -C "$openSpaceHome" diff -- '*.cpp' '*.h' '*.hpp' '*.inl' || true
        
    - name: Update Homebrew and Install GLM
      run: |
        brew update
        brew install glm
    
    - name: Cache Homebrew downloads 
      uses: actions/cache@v6 
      with: 
        path: | 
          ~/Library/Caches/Homebrew 
          /usr/local/Homebrew 
        key: macos26-cmake4-brew-v1
        restore-keys: | 
          macos26-cmake4-brew-
            
    - name: Install dependencies
      timeout-minutes: 30
      # https://docs.openspaceproject.com/releases-v0.20/contribute/development/compiling/ubuntu.html
      run: |
        brew install glew boost freeimage mpv vulkan-headers vulkan-loader brotli gdal qt@6
        df -h

    - name: Install libtiff codec dependencies
      run: brew install libtiff zstd xz jpeg-turbo lcms2 libpng

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd "$openSpaceHome/build"
        # https://stackoverflow.com/questions/16700415/cmake-generate-xcode-project-from-existing-sources
        # CMAKE_PREFIX_PATH to /opt/homebrew - https://stackoverflow.com/questions/68105648/configure-cmake-to-work-with-homebrew-libraries-instead-system-provided-librarie
        TIFF_LIB=$(brew --prefix libtiff)     
        cmake -G Xcode \
                  -Wno-dev \
                  -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                  -DCMAKE_CXX_STANDARD=20 \
                  -DONLY_ACTIVE_ARCH=YES \
                  -DCMAKE_OSX_ARCHITECTURES=arm64 \
                  -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
                  -DCMAKE_CXX_FLAGS="-Wno-error -D_FILE_OFFSET_BITS=64" \
                  -DCMAKE_C_FLAGS="-Wno-error -D_FILE_OFFSET_BITS=64" \
                  -DCMAKE_BUILD_TYPE="Release" \
                  -DCMAKE_PREFIX_PATH=/opt/homebrew \
                  -DCMAKE_EXE_LINKER_FLAGS="-L${TIFF_LIB}/lib -L/opt/homebrew/lib" \
                  -DBUILD_TESTS=OFF \
                  -DCOMPILE_WARNING_AS_ERROR=OFF \
                  -DOPENSPACE_MODULE_MOLECULE=OFF \
                  -DOPENSPACE_MODULE_GAIA=OFF \
                  -DOPENSPACE_HAVE_TESTS=OFF \
                  -DSGCT_BUILD_TESTS=OFF \
                  -DSGCT_DEP_INCLUDE_LIBPNG=OFF \
                  -DPNG_PNG_INCLUDE_DIR=$(brew --prefix libpng)/include \
                  -DTIFF_LIBRARY="${TIFF_LIB}/lib/libtiff.dylib" \
                  -DTIFF_INCLUDE_DIR="${TIFF_LIB}/include" \
                  "$openSpaceHome"
    
    - name: Build
      continue-on-error: true
      # Build your program with the given configuration
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd "$openSpaceHome/build"
        # echo "Check to see if we have enough disk space ... " only 8 GB used out of 120+ GB
        # df -h
        cmake --build . --config ${{env.BUILD_TYPE}} --target OpenSpace --parallel -- 
        df -h

    - name: Inspect what actually got built
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd "$openSpaceHome"
        find bin -iname "*Helper*" -maxdepth 4
        find bin -maxdepth 2

    - name: Backup 1 - CEF framework right after build
      if: runner.os == 'macOS'
      run: |
        MAIN_APP=$(find $HOME/source/OpenSpace/bin/Release -name "OpenSpace.app" -maxdepth 1)
        BACKUP1_DIR="$HOME/frameworks-backup-1-cef"
        mkdir -p "$BACKUP1_DIR"
        cp -R "$MAIN_APP/Contents/Frameworks/." "$BACKUP1_DIR/"
        echo "Backup 1 (post-build, CEF+helpers):"
        ls -la "$BACKUP1_DIR"

    - name: Bundle Homebrew dylibs (GDAL, etc.)
      if: runner.os == 'macOS'
      run: |
        brew install dylibbundler
    
        MAIN_APP=$(find $HOME/source/OpenSpace/bin/Release -name "OpenSpace.app" -maxdepth 1)
    
        if [ -z "$MAIN_APP" ]; then
          echo "Error: OpenSpace.app not found"
          exit 1
        fi
    
        echo "Bundling dylibs into: $MAIN_APP"
        mkdir -p "$MAIN_APP/Contents/Frameworks"
    
        dylibbundler -od -b \
          -x "$MAIN_APP/Contents/MacOS/OpenSpace" \
          -d "$MAIN_APP/Contents/Frameworks" \
          -p "@executable_path/../Frameworks/"
    
        # Also bundle for the CEF helper executables, in case any Homebrew libs
        # leaked into their link line too
        for helper in "OpenSpace_Helper" "OpenSpace_Helper_GPU" "OpenSpace_Helper_Renderer"; do
          HELPER_EXE="$MAIN_APP/Contents/Frameworks/OpenSpace Helper.app/Contents/MacOS/OpenSpace Helper"
          if [ "$helper" = "OpenSpace_Helper_GPU" ]; then
            HELPER_EXE="$MAIN_APP/Contents/Frameworks/OpenSpace Helper (GPU).app/Contents/MacOS/OpenSpace Helper (GPU)"
          elif [ "$helper" = "OpenSpace_Helper_Renderer" ]; then
            HELPER_EXE="$MAIN_APP/Contents/Frameworks/OpenSpace Helper (Renderer).app/Contents/MacOS/OpenSpace Helper (Renderer)"
          fi
          if [ -f "$HELPER_EXE" ]; then
            echo "Checking $helper for stray Homebrew deps..."
            dylibbundler -od -b \
              -x "$HELPER_EXE" \
              -d "$MAIN_APP/Contents/Frameworks" \
              -p "@executable_path/../../../../Frameworks/"
          fi
        done

    - name: Restore CEF, then take Backup 2 (CEF + GDAL dylibs)
      if: runner.os == 'macOS'
      run: |
        MAIN_APP=$(find $HOME/source/OpenSpace/bin/Release -name "OpenSpace.app" -maxdepth 1)
        BACKUP1_DIR="$HOME/frameworks-backup-1-cef"
        BACKUP2_DIR="$HOME/frameworks-backup-2-with-gdal"
    
        echo "Frameworks after dylibbundler (before CEF restore):"
        ls -la "$MAIN_APP/Contents/Frameworks"
    
        echo "Restoring CEF/helpers on top (undoes any dylibbundler damage)..."
        chmod -R u+w "$MAIN_APP/Contents/Frameworks"
        cp -Rf "$BACKUP1_DIR/." "$MAIN_APP/Contents/Frameworks/"
    
        echo "Taking Backup 2 - full known-good state (CEF + GDAL dylibs)..."
        mkdir -p "$BACKUP2_DIR"
        cp -R "$MAIN_APP/Contents/Frameworks/." "$BACKUP2_DIR/"
        ls -la "$BACKUP2_DIR"

    
    - name: Bundle Qt frameworks
      if: runner.os == 'macOS'
      run: |
        MAIN_APP=$(find $HOME/source/OpenSpace/bin/Release -name "OpenSpace.app" -maxdepth 1)
    
        if [ -z "$MAIN_APP" ]; then
          echo "Error: OpenSpace.app not found"
          exit 1
        fi
    
        QT_PREFIX=$(brew --prefix qt@6 2>/dev/null || brew --prefix qt 2>/dev/null)
        echo "Qt prefix: $QT_PREFIX"
    
        MACDEPLOYQT=$(find "$QT_PREFIX" -name "macdeployqt" -type f 2>/dev/null | head -n 1)
    
        if [ -z "$MACDEPLOYQT" ]; then
          echo "Error: macdeployqt not found under $QT_PREFIX"
          echo "Searching whole Homebrew prefix as a fallback..."
          MACDEPLOYQT=$(find "$(brew --prefix)" -name "macdeployqt" -type f 2>/dev/null | head -n 1)
        fi
    
        if [ -z "$MACDEPLOYQT" ]; then
          echo "Error: macdeployqt not found anywhere under Homebrew prefix"
          exit 1
        fi
    
        echo "Using macdeployqt at: $MACDEPLOYQT"
        "$MACDEPLOYQT" "$MAIN_APP" -always-overwrite -verbose=2
    
        echo "Verifying no more /opt/homebrew Qt references remain..."
        otool -L "$MAIN_APP/Contents/MacOS/OpenSpace" | grep -i homebrew && \
          { echo "WARNING: Homebrew paths still present"; exit 1; } || \
          echo "Clean — no Homebrew paths in main executable."

    - name: Restore Backup 2 (CEF + GDAL) before signing
      if: runner.os == 'macOS'
      run: |
        MAIN_APP=$(find $HOME/source/OpenSpace/bin/Release -name "OpenSpace.app" -maxdepth 1)
        BACKUP2_DIR="$HOME/frameworks-backup-2-with-gdal"
    
        echo "Frameworks after macdeployqt (before final restore):"
        ls -la "$MAIN_APP/Contents/Frameworks"
    
        echo "Restoring CEF + GDAL on top (Qt frameworks macdeployqt added stay untouched)..."
        chmod -R u+w "$MAIN_APP/Contents/Frameworks"
        cp -Rf "$BACKUP2_DIR/." "$MAIN_APP/Contents/Frameworks/"
    
        echo "Final Frameworks contents before signing:"
        ls -la "$MAIN_APP/Contents/Frameworks"

    - name: Deduplicate rpaths
      if: runner.os == 'macOS'
      run: |
        MAIN_APP=$(find $HOME/source/OpenSpace/bin/Release -name "OpenSpace.app" -maxdepth 1)

        if [ -z "$MAIN_APP" ]; then
          echo "Error: OpenSpace.app not found"
          exit 1
        fi

        echo "Scanning for Mach-O binaries under: $MAIN_APP"

        # No `set -e` / `pipefail` here on purpose - one bad file must not kill the whole scan.
        find "$MAIN_APP" -type f \( -name "*.dylib" -o -perm +111 \) -print0 | \
        while IFS= read -r -d '' binary; do

          file "$binary" 2>/dev/null | grep -q "Mach-O" || continue

          rpaths=$(otool -l "$binary" 2>/dev/null | \
            awk '/cmd LC_RPATH/{f=1} f && /path /{ $1=""; sub(/ \(offset [0-9]+\)$/,""); sub(/^ /,""); print; f=0 }')

          [ -z "$rpaths" ] && continue

          uniq_paths=$(printf '%s\n' "$rpaths" | sort -u)

          while IFS= read -r rpath; do
            [ -z "$rpath" ] && continue
            count=$(printf '%s\n' "$rpaths" | grep -c -F -x "$rpath")
            if [ "$count" -gt 1 ]; then
              echo ""
              echo "Duplicate rpath in: $binary"
              echo "  Path: $rpath"
              echo "  Occurrences: $count -> removing $((count - 1)) extra"
              remove_n=$((count - 1))
              for ((i=0; i<remove_n; i++)); do
                install_name_tool -delete_rpath "$rpath" "$binary" 2>&1 | grep -v "^$" | sed 's/^/    /'
              done
              new_count=$(otool -l "$binary" 2>/dev/null | grep -c -F -- "path $rpath ")
              echo "  After cleanup: $new_count occurrence(s) remaining"
            fi
          done <<< "$uniq_paths"
        done

        echo ""
        echo "Verifying no duplicates remain..."
        remaining=$(find "$MAIN_APP" -type f \( -name "*.dylib" -o -perm +111 \) -exec sh -c '
          file "$1" 2>/dev/null | grep -q "Mach-O" || exit 0
          n=$(otool -l "$1" 2>/dev/null | grep -c "path @executable_path/../Frameworks")
          [ "$n" -gt 1 ] && echo "$1: $n entries"
        ' _ {} \;)

        if [ -n "$remaining" ]; then
          echo "Error: duplicate rpaths still remain after dedup:"
          echo "$remaining"
          exit 1
        fi

        echo "✓ No duplicate rpaths remain"


    - name: Wrap main executable to launch in Terminal
      run: |
        APP_PATH=$(find $HOME/source/OpenSpace/bin/Release -name "OpenSpace.app" -maxdepth 1)
        MACOS_DIR="$APP_PATH/Contents/MacOS"
    
        # EXE_NAME=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Contents/Info.plist")
        EXE_NAME=OpenSpace
    
        if [ -z "$EXE_NAME" ] || [ ! -f "$MACOS_DIR/$EXE_NAME" ]; then
          echo "Could not resolve main executable" >&2
          exit 1
        fi
    
        # Move the real binary aside (only if not already done, so re-runs are safe)
        if [ ! -f "$MACOS_DIR/$EXE_NAME-bin" ]; then
          mv "$MACOS_DIR/$EXE_NAME" "$MACOS_DIR/$EXE_NAME-bin"
        fi
    
        echo '#!/bin/bash' > "$MACOS_DIR/$EXE_NAME"
        echo 'cd "${0%/*}"' >> "$MACOS_DIR/$EXE_NAME"
        echo "open -a Terminal.app \"./$EXE_NAME-bin\"" >> "$MACOS_DIR/$EXE_NAME"
    
        chmod +x "$MACOS_DIR/$EXE_NAME"
    
    - name: Clean extended attributes before signing
      if: runner.os == 'macOS'
      run: |
        MAIN_APP=$(find $HOME/source/OpenSpace/bin/Release -name "OpenSpace.app" -maxdepth 1)
        echo "Stripping extended attributes (quarantine, resource forks, stale xattrs)..."
        xattr -cr "$MAIN_APP"
        
    - name: Sign macOS App (Ad-hoc)
      if: runner.os == 'macOS'
      run: |
        MAIN_APP=$(find $HOME/source/OpenSpace/bin/Release -name "OpenSpace.app" -maxdepth 1)
        if [ -z "$MAIN_APP" ]; then
          echo "Error: OpenSpace.app not found"
          exit 1
        fi
        echo "Found main app at: $MAIN_APP"

        # 1. Sign loose dylibs/executables directly under Contents (not in nested .framework/.app)
        echo "Signing all dylibs and executables..."
        find "$MAIN_APP/Contents" -type f \( -name "*.dylib" -o -perm +111 \) -print0 | \
        while IFS= read -r -d '' file; do
          case "$file" in
            *".framework/"*) continue ;;                # handled in step 2-5
            *"Helper"*".app/"*) continue ;;             # handled in step 7 (any *Helper*.app)
            *"/MacOS/OpenSpace") continue ;;             # handled in step 8 (main exe)
          esac
          echo "  Signing $(basename "$file")..."
          codesign --force --sign - "$file"
        done

        # 2-4. CEF framework (unchanged)
        echo "Signing CEF Framework libraries..."
        find "$MAIN_APP/Contents/Frameworks/Chromium Embedded Framework.framework/Libraries" -type f -perm +111 -print0 2>/dev/null | \
        while IFS= read -r -d '' file; do
          codesign --force --sign - "$file" 2>/dev/null || true
        done
        echo "Signing CEF Framework..."
        codesign --force --sign - "$MAIN_APP/Contents/Frameworks/Chromium Embedded Framework.framework/Chromium Embedded Framework"
        codesign --force --sign - "$MAIN_APP/Contents/Frameworks/Chromium Embedded Framework.framework"

        # 5. Qt/other frameworks
        echo "Signing all frameworks..."
        find "$MAIN_APP/Contents/Frameworks" -name "*.framework" -not -path "*Chromium Embedded Framework.framework*" -print0 | \
        sort -zr | \
        while IFS= read -r -d '' framework; do
          FRAMEWORK_NAME=$(basename "$framework" .framework)
          find "$framework" -name "*.dylib" -print0 2>/dev/null | while IFS= read -r -d '' dylib; do
            echo "    Signing nested $(basename "$dylib")..."
            codesign --force --sign - "$dylib" 2>/dev/null || true
          done
          if [ -f "$framework/Versions/A/$FRAMEWORK_NAME" ]; then
            codesign --force --sign - "$framework/Versions/A/$FRAMEWORK_NAME"
          elif [ -f "$framework/$FRAMEWORK_NAME" ]; then
            codesign --force --sign - "$framework/$FRAMEWORK_NAME"
          fi
          echo "  Signing $FRAMEWORK_NAME framework..."
          codesign --force --sign - "$framework"
        done

        # 6. Qt plugins
        echo "Signing Qt plugins..."
        if [ -d "$MAIN_APP/Contents/PlugIns" ]; then
          find "$MAIN_APP/Contents/PlugIns" -name "*.dylib" -print0 | while IFS= read -r -d '' lib; do
            echo "  Signing $(basename "$lib")..."
            codesign --force --sign - "$lib"
          done
        fi

        # 7. Helper apps - discovered dynamically (handles "OpenSpace Helper.app", "OpenSpace Helper (GPU).app", etc.)
        echo "Signing Helper apps..."
        find "$MAIN_APP/Contents/Frameworks" -maxdepth 1 -name "*Helper*.app" -print0 | \
        while IFS= read -r -d '' HELPER_PATH; do
          echo "Signing $(basename "$HELPER_PATH")..."
          find "$HELPER_PATH/Contents" -name "*.dylib" -print0 2>/dev/null | while IFS= read -r -d '' dylib; do
            codesign --force --sign - "$dylib" 2>/dev/null || true
          done
          HELPER_EXE=$(find "$HELPER_PATH/Contents/MacOS" -type f -perm +111 | head -1)
          if [ -n "$HELPER_EXE" ]; then
            codesign --force --sign - "$HELPER_EXE"
          fi
          codesign --force --sign - "$HELPER_PATH"
        done

        # 8. Main executable
        echo "Signing main executable..."
        codesign --force --sign - "$MAIN_APP/Contents/MacOS/OpenSpace"

        # 9. Main bundle
        echo "Signing main app bundle..."
        codesign --force --sign - "$MAIN_APP"

        # 10. Verify
        echo "Verifying signature..."
        codesign --verify --deep --strict --verbose=2 "$MAIN_APP"

        echo "✓ App successfully signed with ad-hoc signature"
            
    - name: Compare Shaders with Previous Release
      run: |
        cd "$HOME/source/OpenSpace"
        # ---------------------------------------------------------
        # 1. Download and Unzip the previous release
        # ---------------------------------------------------------
        echo "Downloading previous release..."
        DOWNLOAD_URL="https://github.com/hn-88/OpenSpace-AppImage/releases/download/daily-MacOS-app-single-precision/OpenSpace-minimal-daily-mac.zip"
        
        # Download (-L follows redirects, -s silent, -O saves with remote name)
        # We save to a specific temp name to avoid overwriting local files
        curl -L "$DOWNLOAD_URL" -o prev_build.zip
        
        # Unzip quiet (-q) into a temp directory
        mkdir -p prev_build_temp
        unzip -q prev_build.zip -d prev_build_temp
        
        # Locate the extracted root (handles if zip has a top-level folder like 'OpenSpace')
        # find gets the first directory inside prev_build_temp
        #PREV_ROOT=$(find prev_build_temp -mindepth 1 -maxdepth 1 -type d | head -n 1)
        # This finds other directories, like the documentation directory is head -n 1
        
        # Fallback: if no directory found (zip was flat), use the temp dir itself
        #if [ -z "$PREV_ROOT" ]; then
        PREV_ROOT="prev_build_temp"
        #fi
        echo "Previous build root located at: $PREV_ROOT"

        # debugging test to trigger the diff test to true
        # rm -v $PREV_ROOT/modules/globebrowsing/shaders/renderer_fs.glsl
    
        # ---------------------------------------------------------
        # 2. Compare ./shaders and ./modules/*/shaders
        # ---------------------------------------------------------
        DIFF_FOUND=false
    
        # Function to check diff and update flag
        check_diff() {
            local dir1="$1"
            local dir2="$2"
            
            if [ -d "$dir1" ] && [ -d "$dir2" ]; then
                # diff -r (recursive) -q (quiet/brief) returns 1 if differences found
                if ! diff -rq "$dir1" "$dir2"; then
                    echo "Difference found in: $dir1"
                    DIFF_FOUND=true
                fi
            elif [ -d "$dir1" ]; then
                echo "New directory found in current build: $dir1"
                DIFF_FOUND=true
            fi
        }
    
        echo "Checking core shaders..."        
        check_diff "./shaders" "$PREV_ROOT/shaders"
    
        echo "Checking module shaders..."
        # Enable nullglob so the loop does not run if no modules exist
        shopt -s nullglob
        for shader_dir in modules/*/shaders; do
            # Map ./modules/ModuleA/shaders -> $PREV_ROOT/modules/ModuleA/shaders
            prev_shader_dir="$PREV_ROOT/$shader_dir"
            check_diff "$shader_dir" "$prev_shader_dir"
        done
    
        # ---------------------------------------------------------
        # 3. Set Environment Variables
        # ---------------------------------------------------------
        if [ "$DIFF_FOUND" = "false" ]; then
            echo "No shader differences detected."
            echo "MINZIP_FILE=/Users/runner/source/OpenSpace/OpenSpace-minimal-daily-mac.zip" >> $GITHUB_ENV
            echo "ZIPFILENAME=OpenSpace-minimal-daily-mac.zip" >> $GITHUB_ENV
        else
            echo "Shader differences detected."
            echo "MINZIP_FILE=/Users/runner/source/OpenSpace/OpenSpace-minimal-daily-mac-testing.zip" >> $GITHUB_ENV
            echo "ZIPFILENAME=OpenSpace-minimal-daily-mac-testing.zip" >> $GITHUB_ENV
        fi
    
        # Cleanup
        rm -rf prev_build.zip prev_build_temp
      shell: bash

    - name: zip the app
      run: |
        cd $HOME/source/OpenSpace/bin/Release
        zip -r OpenSpaceapp.zip OpenSpace.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        # Artifact name
        name: OpenSpace-MacOS15-AppleSilicon-app
        # optional, default is artifact
        # A file, directory or wildcard pattern that describes what to upload
        path: /Users/runner/source/OpenSpace/bin/Release/OpenSpaceapp.zip

    - name: Prepare and deploy (MacOS)
      shell: bash
      run: |
        openSpaceHome="$HOME/source/OpenSpace"
        cd "$openSpaceHome"
        echo "### Deploying for MacOS (Release build)"

        # Define variables
        APP_NAME="OpenSpace"
        # CMake on macOS often places the .app bundle in bin/Release or just Release depending on configuration
        # Adjust this path if your build places it elsewhere (e.g., just "Release/$APP_NAME.app")
        APP_BUNDLE_PATH="bin/Release/$APP_NAME.app"
                
        # Copy documentation files to the root of the DMG/Zip (outside the app) or inside Resources.
        # Usually, License/Readme files sit next to the .app in the zip.
        # We will prepare a 'staging' folder to zip everything together cleanly.
        mkdir -p deploy_staging
        mkdir -p deploy_staging/bin
        mv "$APP_BUNDLE_PATH" deploy_staging/bin

        # Copy text files next to the App (so user sees them upon unzipping)
        cp ACKNOWLEDGMENTS.md deploy_staging/
        cp CITATION.cff deploy_staging/
        cp CREDITS.md deploy_staging/
        cp LICENSE.md deploy_staging/
        cp README.md deploy_staging/

        # Copy top-level configuration and data folders
        cp -R config deploy_staging/
        cp -R data deploy_staging/
        cp -R documentation deploy_staging/
        cp -R modules deploy_staging/
        cp -R scripts deploy_staging/
        cp -R shaders deploy_staging/
        cp openspace.cfg deploy_staging/
        
        # Copy sync folder if it exists (handling the variable %sync% from original script)
        if [ ! -z "$sync" ]; then
             cp -R $sync deploy_staging/
        fi

        # 3. Zip the result
        echo "### Create main zip file"
        cd deploy_staging
        
        # Zip the bundle and the text files. 
        # -y preserves symlinks (CRITICAL for Qt frameworks inside the .app)
        # -r recursive
        zip -r -9 -y ../$ZIPFILENAME . \
          -x "*.git*" \
          -x "*.DS_Store"

        echo "Deployment package created: OpenSpace-minimal-daily-mac(-testing).zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        # Artifact name
        name: OpenSpace-MacOS15-AppleSilicon-minimal
        # optional, default is artifact
        # A file, directory or wildcard pattern that describes what to upload
        path: ${{ env.MINZIP_FILE }}

    - name: Upload .app to GitHub Release
      run: |
        RELEASE_TAG="daily-MacOS-app-single-precision"
        # APP_FILE=/Users/runner/source/OpenSpace/bin/Release/OpenSpaceapp.zip
        # MINZIP_FILE=/Users/runner/source/OpenSpace/OpenSpace-minimal-daily-mac-testing.zip
    
        # Create release if it doesn't exist
        gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$RELEASE_TAG" -t "OpenSpace MacOS AppleSilicon Daily Build" -n "Automated daily .app build of OpenSpace."
    
        # (Optional) update title/notes each run
        gh release edit "$RELEASE_TAG" \
          -t "OpenSpace-single-precision MacOS AppleSilicon Build" \
          -n "Build of OpenSpace - patched to single-precision - (updated $(date '+%Y-%m-%d %H:%M:%S') UTC).  Please see the documentation at https://github.com/hn-88/OpenSpace-AppImage/wiki/OpenSpace-on-Mac "
    
        # Upload .app asset (overwrite if exists)
        gh release upload "$RELEASE_TAG" "$MINZIP_FILE" --clobber
        
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}

    - name: Fail if Shaders Differ to force email alert
      if: env.MINZIP_FILE == '/Users/runner/source/OpenSpace/OpenSpace-minimal-daily-mac-testing.zip'
      run: |
        echo "::error::Shaders differ from the previous release!"
        exit 1

      
    
